document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

55,255,0.08);--panel:#13161e;--panel2:#181b23;--drawer:linear-gradient(180deg,#1a1530,#0f0d1a);--muted:#B6BED1;--vignette:radial-gradient(125% 85% at 50% 45%, rgba(7,11,24,0.55) 0%, rgba(7,11,24,0.35) 45%, rgba(7,11,24,0.12) 75%, transparent 100%)}\n  #app-root.light{--bg:#EEF1F7;--txt:#1F2430;--s1:#FFFFFF;--s2:#FFFFFF;--s3:#F4F6FB;--s4:rgba(0,0,0,0.04);--s5:rgba(0,0,0,0.05);--s6:rgba(0,0,0,0.06);--bd:rgba(0,0,0,0.10);--panel:#FFFFFF;--panel2:#FFFFFF;--drawer:linear-gradient(180deg,#FFFFFF,#F4F6FB);--muted:#5B6478;--vignette:none}\n  ::-webkit-scrollbar{width:10px;height:10px}\n  ::-webkit-scrollbar-track{background:transparent}\n  ::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:8px;border:2px solid #070B18}\n  ::-webkit-scrollbar-thumb:hover{background:rgba(255,255,255,0.18)}\n  @keyframes spin{to{transform:rotate(360deg)}}\n  @keyframes pillPulse{0%,100%{box-shadow:0 0 0 0 rgba(47,191,113,0.5)}50%{box-shadow:0 0 0 5px rgba(47,191,113,0)}}\n  @keyframes nameGlow{0%,100%{opacity:1;text-shadow:0 0 10px rgba(47,191,113,0.7)}50%{opacity:0.78;text-shadow:none}}\n  @keyframes cardGlow{0%,100%{box-shadow:0 0 0 1px rgba(47,191,113,0.7),0 0 16px rgba(47,191,113,0.25)}50%{box-shadow:0 0 0 1px var(--s5)}}\n  @keyframes toastIn{from{opacity:0;transform:translate(-50%,12px)}to{opacity:1;transform:translate(-50%,0)}}\n  @keyframes auroraFloat{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(3%,4%) scale(1.08)}}\n  @keyframes sheetUp{from{transform:translateY(100%)}to{transform:translateY(0)}}\n  @keyframes popIn{from{opacity:0;transform:translateY(-6px) scale(0.97)}to{opacity:1;transform:translateY(0) scale(1)}}\n  @keyframes fadeIn{from{opacity:0}to{opacity:1}}\n  @keyframes blinkRed{0%,100%{box-shadow:0 0 0 0 rgba(239,68,68,0.55);opacity:1}50%{box-shadow:0 0 0 5px rgba(239,68,68,0);opacity:.7}}\n  /* tasks slide-in drawer */\n  .ot-grid{display:block}\n  .form-2col{display:grid;grid-template-columns:1fr 1fr;gap:12px}\n  .form-2col > div{min-width:0}\n  .form-2col input{min-width:0;max-width:100%}\n  @media(max-width:520px){ .form-2col{grid-template-columns:1fr;gap:0} }\n  .task-scrim{position:fixed;inset:0;background:rgba(5,7,16,0.55);backdrop-filter:blur(3px);-webkit-backdrop-filter:blur(3px);z-index:130;opacity:0;pointer-events:none;transition:opacity .25s ease}\n  .task-scrim.open{opacity:1;pointer-events:auto}\n  .task-drawer{position:fixed;top:0;bottom:0;right:0;width:360px;max-width:88vw;z-index:131;transform:translateX(105%);transition:transform .3s cubic-bezier(0.22,1,0.36,1);display:flex;flex-direction:column}\n  .task-drawer.open{transform:translateX(0)}\n  .task-fab{position:fixed;bottom:22px;left:22px;z-index:120;width:56px;height:56px;border-radius:50%;border:none;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;padding:0;color:#fff;background:linear-gradient(135deg,#F43F5E,#F59E0B);box-shadow:0 12px 30px rgba(244,63,94,0.45)}\n  .task-fab:hover{transform:translateY(-1px)}\n  .task-fab .fab-badge{position:absolute;top:-2px;left:-2px;background:#ef4444;color:#fff;font-size:11px;font-weight:800;min-width:21px;height:21px;border-radius:11px;display:flex;align-items:center;justify-content:center;padding:0 5px;border:2px solid #0a0d18}\n  @media(max-width:560px){ .task-fab{bottom:18px;left:18px} }\n  /* mobile conveniences */\n  .new-fab{display:none}\n  .oo-controls{position:sticky;top:0;z-index:60;padding-top:8px;background:linear-gradient(to bottom,var(--bg) 78%,transparent)}\n  @media(max-width:860px){\n    .hdr-new{display:none !important}\n    .new-fab{display:inline-flex !important;position:fixed;bottom:18px;right:18px;z-index:120;height:52px;border-radius:16px;border:none;cursor:pointer;align-items:center;gap:8px;padding:0 20px;font-family:'Heebo',sans-serif;font-size:14px;font-weight:800;color:#fff}\n    .jbtn{width:40px !important;height:40px !important}\n    .jbtn svg{width:17px !important;height:17px !important}\n  }\n  @media print{\n    html,body{  24 24\" fill=\"none\" stroke=\"currentColor\" strokewidth=\"1.8\" strokelinecap=\"round\" strokelinejoin=\"round\"><rect x=\"2\" y=\"4\" width=\"20\" height=\"16\" rx=\"2\"><\u002Frect><path d=\"m22 7-10 6L2 7\"><\u002Fpath><\u002Fsvg>מייל\n        <\u002Fbutton>\n      <\u002Fdiv>\n      <p style=\"margin-top:12px;font-size:11.5px;color:#5b606e\">נפתח אצלך — אין צורך בשום תוכנה נוספת<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ======= STATUS PICKER ======= -->\n  <!-- mobile bottom-sheet -->\n  <div onclick=\"{{ onCloseStatusPick }}\" style=\"position:fixed;inset:0;background:rgba(5,6,10,0.6);z-index:120;align-items:flex-end;justify-content:center;padding:0;backdrop-filter:blur(8px);animation:fadeIn .2s ease;{{ statusSheetOverlayCss }}\">\n    <div onclick=\"{{ stopProp }}\" style=\"background:linear-gradient(180deg,#1a1d27,#13151d);border:1px solid rgba(255,255,255,0.1);border-bottom:none;border-radius:24px 24px 0 0;padding:14px 16px 24px;width:100%;max-width:520px;box-shadow:0 -16px 50px rgba(0,0,0,0.55);animation:sheetUp .28s cubic-bezier(0.22,1,0.36,1)\">\n      <div style=\"width:40px;height:4px;border-radius:3px;background:rgba(255,255,255,0.16);margin:0 auto 14px\"><\u002Fdiv>\n      <div style=\"font-size:12.5px;font-weight:700;color:#7e889a;margin-bottom:12px;text-align:center;letter-spacing:.3px\">עדכון סטטוס<\u002Fdiv>\n      <div style=\"display:flex;flex-direction:column;gap:6px\">\n        <sc-for list=\"{{ statusPickItems }}\" as=\"si\" hint-placeholder-count=\"4\">\n          <div onclick=\"{{ si.onPick }}\" style=\"display:flex;align-items:center;gap:11px;padding:12px 14px;border-radius:12px;cursor:pointer;font-size:14.5px;font-weight:700;transition:background .12s;{{ si.itemCss }}\">\n            <span style=\"width:11px;height:11px;border-radius:50%;flex-shrink:0;{{ si.dotCss }}\"><\u002Fspan>\n            <span style=\"flex:1\">{{ si.label }}<\u002Fspan>\n            <sc-if value=\"{{ si.isCur }}\" hint-placeholder-val=\"{{ false }}\">\n              <svg width=\"17\" height=\"17\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" strokewidth=\"2.4\" strokelinecap=\"round\" strokelinejoin=\"round\"><path d=\"M20 6 9 17l-5-5\"><\u002Fpath><\u002Fsvg>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- desktop popover -->\n  <div onclick=\"{{ onCloseStatusPick }}\" style=\"position:fixed;inset:0;z-index:120;{{ statusPopBackdropCss }}\"><\u002Fdiv>\n  <div style=\"z-index:121;background:linear-gradient(180deg,#1f2230,#181b24);border:1px solid rgba(255,255,255,0.12);border-radius:14px;padding:6px;box-shadow:0 18px 44px rgba(0,0,0,0.6), 0 0 0 1px var(--s2);transform-origin:top right;animation:popIn .16s cubic-bezier(0.22,1,0.36,1);{{ statusPopCss }}\">\n    <sc-for list=\"{{ statusPickItems }}\" as=\"si\" hint-placeholder-count=\"4\">\n      <div onclick=\"{{ si.onPick }}\" style=\"display:flex;align-items:center;gap:9px;padding:9px 12px;border-radius:9px;cursor:pointer;font-size:13.5px;font-weight:700;transition:background .12s;{{ si.itemCss }}\">\n        <span style=\"width:9px;height:9px;border-radius:50%;flex-shrink:0;{{ si.dotCss }}\"><\u002Fspan>\n        <span style=\"flex:1\">{{ si.label }}<\u002Fspan>\n        <sc-if value=\"{{ si.isCur }}\" hint-placeholder-val=\"{{ false }}\">\n          <svg width=\"15\" height=\"15\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" strokewidth=\"2.4\" strokelinecap=\"round\" strokelinejoin=\"round\"><path d=\"M20 6 9 17l-5-5\"><\u002Fpath><\u002Fsvg>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n    <\u002Fsc-for>\n  <\u002Fdiv>\n\n  <!-- ======= IMAGE LIGHTBOX ======= -->\n  <div onclick=\"{{ onCloseLightbox }}\" style=\"position:fixed;inset:0;background:rgba(5,6,10,0.92);z-index:200;align-items:center;justify-content:center;padding:28px;backdrop-filter:blur(6px);animation:fadeIn .18s ease;{{ lightboxCss }}\">\n    {{ lightboxEl }}\n    <button onclick=\"{{ onCloseLightbox }}\" title=\"סגור\" style=\"position:fixed;top:20px;left:20px;width:42px;height:42px;border-radius:12px;border:none;cursor:pointer;background:rgba(255,255,255,0.1);color:#fff;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px)\" style-hover=\"background:rgba(255,255,255,0.2)\">\n      <svg width=\"20\" height=\"20\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" strokewidth=\"2.2\" strokelinecap=\"round\"><path d=\"M18 6 6 18M6 6l12 12\"><\u002Fpath><\u002Fsvg>\n    <\u002Fbutton>\n  <\u002Fdiv>\n\n  <!-- ======= TOAST ======= -->\n  <div style=\"position:fixed;bottom:28px;left:50%;color:#fff;font-size:13.5px;font-weight:700;padding:12px 24px;border-radius:13px;pointer-events:none;white-space:nowrap;z-index:999;box-shadow:0 8px 30px rgba(0,0,0,0.5);{{ toastCss }}\">{{ toastMsg }}<\u002Fdiv>\n<\u002Fdiv>\n<div id=\"print-area\"><\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1100,&quot;height&quot;:900},&quot;accent&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;default&quot;:&quot;violet&quot;,&quot;options&quot;:[&quot;violet&quot;,&quot;blue&quot;,&quot;green&quot;,&quot;amber&quot;,&quot;slate&quot;],&quot;tsType&quot;:&quot;string&quot;},&quot;title&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;ניהול הזמנות — בית דפוס&quot;,&quot;tsType&quot;:&quot;string&quot;}}\">\nclass Component extends DCLogic {\n  state = {\n    orders: [],\n    query: '',\n    filterStatus: '',\n    catFilter: '',\n    openClients: [],\n    loading: true,\n    errored: false,\n    modal: null,            // 'order' | 'sum' | null\n    editJobId: null,\n    sumOrderId: null,\n    form: this.blankForm(),\n    acItems: [],\n    acOpen: false,\n    toast: '',\n    toastKey: 0,\n    statusPickId: null,\n    statusPickRect: null,\n    statusPickMobile: false,\n    lightbox: null,\n    tasks: [],\n    taskFilter: '',\n    newTaskText: '',\n    newTaskCat: 'gen',\n    newTaskDate: '',\n    newTaskTime: '',\n    editTaskId: null,\n    editText: '',\n    editCat: 'gen',\n    editDate: '',\n    editTime: '',\n    tasksDrawerOpen: false,\n    priceList: [],\n    itemAcIdx: null,\n    theme: (()=>{ try{ return localStorage.getItem('zoom_theme')||'dark'; }catch(e){ return 'dark'; } })()\n  };\n\n  SHEETS_URL = 'https://script.google.com/macros/s/AKfycbzg0VspXL7Q8gS_Z5m76CUOrMIHi0DfouwRaO1TuHPVtshdHvnItxEoi0oesGtQi9Jv/exec';\n  SL = { hold:'בהמתנה', prod:'בייצור', ready:'מוכן', done:'נמסרה' };\n  SLR = { 'בהמתנה':'hold', 'בייצור':'prod', 'מוכן':'ready', 'נמסרה':'done' };\n  nextId = 1001;\n  _toastTimer = null;\n\n  blankForm(){\n    return { name:'', phone:'', type:'', price:'', date:this.localDate?this.localDate():'', due:'', status:'hold', install:false, docType:'order', category:'print', image:'', proposal:'', notes:'', time:'', items:[{name:'',dims:'',qty:'1',price:''}] };\n  }\n\n  parseNotesToItems(notes){\n    if(!notes || !notes.trim()) return [{name:'',dims:'',qty:'1',price:''}];\n    const lines = notes.split('\\n').filter(l=>l.trim());\n    if(!lines.length) return [{name:'',dims:'',qty:'1',price:''}];\n    return lines.map(line=>{\n      const mQty = line.match(/^(.+?)\\s*[\\u00d7x*]\\s*(\\d+)\\s*=\\s*(\\d+(?:\\.\\d+)?)\\s*$/i);\n      if(mQty){\n        const lbl = mQty[1].trim(); const parts = lbl.split(' ');\n        const dims = parts.length>1 && parts[parts.length-1].includes('/') ? parts.pop() : '';\n        return { name:parts.join(' '), dims, qty:String(mQty[2]), price:String(mQty[3]) };\n      }\n      const mPrice = line.match(/^(.+?)\\s*=\\s*(\\d+(?:\\.\\d+)?)\\s*$/);\n      if(mPrice){\n        const parts = mPrice[1].trim().split(' ');\n        const dims = parts.length>1 && parts[parts.length-1].includes('/') ? parts.pop() : '';\n        return { name:parts.join(' '), dims, qty:'1', price:String(mPrice[2]) };\n      }\n      return { name:line.trim(), dims:'', qty:'1', price:'' };\n    });\n  }\n  itemsToNotes(items){\n    const lines=[]; let total=0;\n    (items||[]).forEach(it=>{\n      const name=(it.name||'').trim(); if(!name) return;\n      const dims=(it.dims||'').trim();\n      const qty=parseFloat(it.qty)||1;\n      const price=parseFloat(it.price)||0;\n      const label=dims?name+' '+dims:name;\n      if(qty>1 && price>0){ lines.push(label+' \\u00d7 '+qty+' = '+price); total+=Math.round(qty*price); }\n      else if(price>0){ lines.push(label+' = '+price); total+=price; }\n      else lines.push(label);\n    });\n    return { notes:lines.join('\\n'), total };\n  }\n  syncItems(items){\n    const { notes, total } = this.itemsToNotes(items);\n    this.setState(s=>({ form:{ ...s.form, items, notes, price: total>0?String(total):'' } }));\n  }\n  addItem(){ const items=[...(this.state.form.items||[]), {name:'',dims:'',qty:'1',price:''}]; this.syncItems(items); }\n  removeItem(idx){ let items=(this.state.form.items||[]).filter((_,i)=>i!==idx); if(!items.length) items=[{name:'',dims:'',qty:'1',price:''}]; this.syncItems(items); }\n  setItem(idx, key, val){\n    let items=(this.state.form.items||[]).map((it,i)=> i===idx ? {...it,[key]:val} : it);\n    if(key==='dims'){ items=items.map((it,i)=> i===idx ? this.recalcRow(it) : it); }\n    if(key==='price'){ items=items.map((it,i)=> i===idx ? {...it, rate:''} : it); } // manual override drops the m2 rate\n    if(key==='name'){\n      const q=String(val||'').trim().toLowerCase();\n      const matches=q ? this.state.priceList.filter(p=>p.material.toLowerCase().includes(q)) : [];\n      this.setState({ itemAcIdx: matches.length?idx:null });\n    }\n    this.syncItems(items);\n  }\n  closeItemAc(){ this.setState({ itemAcIdx:null }); }\n\n  componentDidMount(){\n    // re-seed date now that methods exist\n    this.setState({ form: { ...this.state.form, date: this.localDate(), time: this.localTime() } });\n    this.loadTasks();\n    this.loadPrices();\n    this._reminderTimer=setInterval(()=>this.checkReminders(), 30000);\n    setTimeout(()=>this.checkReminders(), 2500);\n    this.loadFromSheets();\n  }\n\n  // ---------- price list (read-only, from the \"מחירים\" sheet) ----------\n  PRICES_KEY='zoom_prices_v1';\n  async loadPrices(){\n    try{ const arr=JSON.parse(localStorage.getItem(this.PRICES_KEY)); if(Array.isArray(arr)) this.setState({ priceList: arr }); }catch(e){}\n    try{\n      const res=await fetch(this.SHEETS_URL+'?type=prices&t='+Date.now());\n      const raw=await res.json();\n      if(!raw || raw.ok!==true || !Array.isArray(raw.prices)) return;\n      const list=raw.prices.map(p=>({ material:String(p.material||'').trim(), price:parseFloat(p.price)||0 })).filter(p=>p.material);\n      this.setState({ priceList:list });\n      try{ localStorage.setItem(this.PRICES_KEY, JSON.stringify(list)); }catch(e){}\n    }catch(e){}\n  }\n  // parse \"50/70\" / \"50x70\" / \"50*70\" (cm) -> area in m2, or null\n  dimsToArea(dims){\n    const s=String(dims||'').trim(); if(!s) return null;\n    const m=s.match(/(\\d+(?:\\.\\d+)?)\\s*[\\/x\\u00d7*]\\s*(\\d+(?:\\.\\d+)?)/i);\n    if(!m) return null;\n    const w=parseFloat(m[1]), h=parseFloat(m[2]);\n    if(!w||!h) return null;\n    return (w/100)*(h/100);\n  }\n  // recompute a row's per-piece price from its m2 rate + dimensions\n  recalcRow(it){\n    if(it.rate===undefined||it.rate===null||it.rate==='') return it;\n    const area=this.dimsToArea(it.dims);\n    if(area===null) return it; // no valid dims yet — keep price as-is\n    const per=Math.round(area*parseFloat(it.rate));\n    return { ...it, price:String(per) };\n  }\n  selectMaterial(idx, material, rate){\n    let items=(this.state.form.items||[]).map((it,i)=>{\n      if(i!==idx) return it;\n      return this.recalcRow({ ...it, name:material, rate:rate });\n    });\n    this.setState({ itemAcIdx:null });\n    this.syncItems(items);\n  }\n\n  // ---------- personal tasks (synced via Google Sheets, localStorage = fast cache) ----------\n  TASKS_KEY='zoom_tasks_v1';\n  loadTasks(){\n    // instant paint from cache, then refresh from the sheet\n    try{ const arr=JSON.parse(localStorage.getItem(this.TASKS_KEY)); if(Array.isArray(arr)) this.setState({ tasks: arr }); }catch(e){}\n    this.loadTasksRemote();\n  }\n  normalizeTask(o){\n    let date=o.date;\n    if(date instanceof Date){ date=`${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,'0')}-${String(date.getDate()).padStart(2,'0')}`; }\n    else{\n      date=String(date||'').trim();\n      if(date.includes('T')){ const d=new Date(date); if(d.getFullYear()>1970){ d.setHours(d.getHours()+3); date=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; } else date=''; }\n      else if(date.includes('/')){ const p=date.split('/'); if(p.length===3) date=`${p[2].substring(0,4)}-${p[1].padStart(2,'0')}-${p[0].padStart(2,'0')}`; }\n      else if(date.includes('-')){ date=date.substring(0,10); }\n    }\n    const dv=o.done;\n    const done = dv===true||dv===1||dv==='1'||dv==='TRUE'||dv==='true'||dv==='כן';\n    let time=String(o.time||'').trim();\n    if(time.includes('T')){ const d=new Date(time); if(d.getFullYear()>1970){ d.setHours(d.getHours()+3); time=`${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`; } else time=''; }\n    else if(time.length>=5){ time=time.substring(0,5); }\n    return { id:String(o.id), text:String(o.text||''), cat:String(o.cat||'gen').trim()||'gen', date, time, done, created:Number(o.created)||0 };\n  }\n  async loadTasksRemote(){\n    try{\n      const res=await fetch(this.SHEETS_URL+'?type=tasks&t='+Date.now());\n      const raw=await res.json();\n      // new script answers with {ok:true, tasks:[...]}; old script returns the orders array → ignore it\n      if(!raw || raw.ok!==true || !Array.isArray(raw.tasks)) return;\n      const remote=raw.tasks.map(o=>this.normalizeTask(o)).filter(t=>t.id&&t.text);\n      const local=this.state.tasks||[];\n      // first-time migration: sheet empty but we have local tasks → push them up, keep local\n      if(remote.length===0 && local.length>0){\n        local.forEach(t=>this.saveTaskRemote(t));\n        return;\n      }\n      const ids=new Set(remote.map(t=>String(t.id)));\n      const now=Date.now();\n      const localById={}; local.forEach(t=>{ localById[String(t.id)]=t; });\n      const pending=local.filter(t=>!ids.has(String(t.id)) && (now-(t.created||0)<15000));\n      // for tasks that exist remotely: if we changed one locally in the last 20s, its POST may\n      // still be in flight — keep our local copy so a quick refresh doesn't revert the change.\n      const RECENT=20000;\n      const mergedRemote=remote.map(rt=>{\n        const lt=localById[String(rt.id)];\n        if(lt && lt.updated && (now-lt.updated<RECENT)) return lt;\n        return rt;\n      });\n      const merged=[...pending, ...mergedRemote];\n      this.setState({ tasks: merged });\n      try{ localStorage.setItem(this.TASKS_KEY, JSON.stringify(merged)); }catch(e){}\n    }catch(e){ /* offline — keep local cache */ }\n  }\n  saveTasks(tasks){\n    this.setState({ tasks });\n    try{ localStorage.setItem(this.TASKS_KEY, JSON.stringify(tasks)); }catch(e){}\n  }\n  saveTaskRemote(task){\n    const t={ id:task.id, text:task.text||'', cat:task.cat||'gen', date:task.date||'', time:task.time||'', done:!!task.done, created:task.created||Date.now() };\n    try{ fetch(this.SHEETS_URL,{ method:'POST', mode:'no-cors', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ action:'saveTask', task:t }) }); }catch(e){}\n  }\n  deleteTaskRemote(id){\n    try{ fetch(this.SHEETS_URL,{ method:'POST', mode:'no-cors', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ action:'deleteTask', id }) }); }catch(e){}\n  }\n  addTask(){\n    const text=(this.state.newTaskText||'').trim();\n    if(!text){ this.showToast('כתוב משימה'); return; }\n    const t={ id: 't'+Date.now()+Math.floor(Math.random()*1000), text, cat: this.state.newTaskCat||'gen', date: this.state.newTaskDate||'', time: this.state.newTaskTime||'', done:false, created: Date.now(), updated: Date.now() };\n    const tasks=[t, ...this.state.tasks];\n    this.saveTasks(tasks);\n    this.saveTaskRemote(t);\n    this.setState({ newTaskText:'', newTaskDate:'', newTaskTime:'' });\n    this.showToast('משימה נוספה');\n    this.ensureNotifyPermission();\n  }\n  startEditTask(id){\n    const t=this.state.tasks.find(x=>x.id===id); if(!t) return;\n    this.setState({ editTaskId:id, editText:t.text||'', editCat:t.cat||'gen', editDate:t.date||'', editTime:t.time||'' });\n  }\n  cancelEditTask(){ this.setState({ editTaskId:null }); }\n  saveEditTask(){\n    const id=this.state.editTaskId; if(!id) return;\n    const text=(this.state.editText||'').trim();\n    if(!text){ this.showToast('כתוב משימה'); return; }\n    const tasks=this.state.tasks.map(t=> t.id===id ? {...t, text, cat:this.state.editCat||'gen', date:this.state.editDate||'', time:this.state.editTime||'', notified:false, updated:Date.now() } : t);\n    this.saveTasks(tasks);\n    const updated=tasks.find(t=>t.id===id);\n    if(updated) this.saveTaskRemote(updated);\n    this.setState({ editTaskId:null });\n    this.showToast('משימה עודכנה');\n    this.ensureNotifyPermission();\n  }\n  ensureNotifyPermission(){\n    try{ if('Notification' in window && Notification.permission==='default'){ Notification.requestPermission(); } }catch(e){}\n  }\n  checkReminders(){\n    const now=new Date();\n    const today=this.localDate();\n    const hhmm=`${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;\n    let changed=false;\n    const tasks=(this.state.tasks||[]).map(t=>{\n      if(t.done || t.notified || !t.date || !t.time) return t;\n      // fire once when the task's date+time has arrived (and within the last 2h so old ones don't spam)\n      if(t.date < today || (t.date===today && t.time <= hhmm)){\n        changed=true;\n        try{ if('Notification' in window && Notification.permission==='granted'){ new Notification('🔔 תזכורת', { body:t.text }); } }catch(e){}\n        this.showToast('🔔 תזכורת: '+t.text);\n        return {...t, notified:true};\n      }\n      return t;\n    });\n    if(changed){ this.saveTasks(tasks); }\n  }\n  toggleTask(id){\n    const now=Date.now();\n    const tasks=this.state.tasks.map(t=> t.id===id ? {...t, done:!t.done, updated:now} : t);\n    this.saveTasks(tasks);\n    const updated=tasks.find(t=>t.id===id);\n    if(updated) this.saveTaskRemote(updated);\n  }\n  removeTask(id){\n    const tasks=this.state.tasks.filter(t=> t.id!==id);\n    this.saveTasks(tasks);\n    this.deleteTaskRemote(id);\n  }\n  taskVals(){\n    const TCAT={\n      cnc:{label:'CNC', tag:{background:'rgba(239,68,68,0.16)',color:'#fca5a5',border:'1px solid rgba(239,68,68,0.6)',animation:'blinkRed 1.3s ease-in-out infinite'}, bar:'#ef4444'},\n      design:{label:'עיצוב', tag:{background:'rgba(245,165,36,0.15)',color:'#fbbf24'}, bar:'#F59E0B'},\n      gen:{label:'כללי', tag:{background:'rgba(139,92,246,0.15)',color:'#c4b5fd'}, bar:'#8B5CF6'}\n    };\n    const tf=this.state.taskFilter||'';\n    const nc=this.state.newTaskCat||'gen';\n    const today=this.localDate();\n    const tmD=new Date(today); tmD.setDate(tmD.getDate()+1);\n    const tomorrow=`${tmD.getFullYear()}-${String(tmD.getMonth()+1).padStart(2,'0')}-${String(tmD.getDate()).padStart(2,'0')}`;\n    const dateInfo=(d)=>{\n      if(!d) return {has:false,label:'',css:''};\n      const p=String(d).split('-'); const base=p.length===3?(p[2]+'/'+p[1]):String(d);\n      if(d===today) return {has:true,label:'היום',css:this.css({color:'#fbbf24',fontWeight:700})};\n      if(d===tomorrow) return {has:true,label:'מחר',css:this.css({color:'#fbbf24'})};\n      if(d<today) return {has:true,label:base,css:this.css({color:'#f87171',fontWeight:700})};\n      return {has:true,label:base,css:this.css({color:'#777d8b'})};\n    };\n    const all=this.s n      noTasks: tasksVals.length===0,\n      noTasksText: all.length===0 ? 'אין משימות עדיין — הוסף אחת למטה' : 'אין משימות בקטגוריה זו',\n      tasksOpenLabel: openCount>0 ? (openCount+' פתוחות') : (all.length?'הכל בוצע ✓':''),\n      hasOpenTasks: openCount>0,\n      openTasksCount: openCount,\n      tasksOpenClass: this.state.tasksDrawerOpen ? 'open' : '',\n      onOpenTasks:()=>this.setState({tasksDrawerOpen:true}),\n      onCloseTasks:()=>this.setState({tasksDrawerOpen:false}),\n      tfAllCss: filtChip(tf===''),\n      tfCncCss: this.css(tf==='cnc'?{ background:'rgba(239,68,68,0.18)', color:'#fca5a5' }:{ color:'#9aa1b0', border:'1px solid rgba(255,255,255,0.1)' }),\n      tfDesignCss: this.css(tf==='design'?{ background:'rgba(245,165,36,0.16)', color:'#fbbf24' }:{ color:'#9aa1b0', border:'1px solid rgba(255,255,255,0.1)' }),\n      tfGenCss: this.css(tf==='gen'?{ background:'rgba(139,92,246,0.2)', color:'#c4b5fd' }:{ color:'#9aa1b0', border:'1px solid rgba(255,255,255,0.1)' }),\n      onTaskFilterAll:()=>this.setState({taskFilter:''}),\n      onTaskFilterCnc:()=>this.setState({taskFilter: tf==='cnc'?'':'cnc'}),\n      onTaskFilterDesign:()=>this.setState({taskFilter: tf==='design'?'':'design'}),\n      onTaskFilterGen:()=>this.setState({taskFilter: tf==='gen'?'':'gen'}),\n      ncCncCss: newChip(nc==='cnc','#fca5a5',{bg:'rgba(239,68,68,0.2)',bd:'rgba(239,68,68,0.55)'}),\n      ncDesignCss: newChip(nc==='design','#fbbf24',{bg:'rgba(245,165,36,0.18)',bd:'rgba(245,165,36,0.5)'}),\n      ncGenCss: newChip(nc==='gen','#c4b5fd',{bg:'rgba(139,92,246,0.2)',bd:'rgba(139,92,246,0.5)'}),\n      onNewCatCnc:()=>this.setState({newTaskCat:'cnc'}),\n      onNewCatDesign:()=>this.setState({newTaskCat:'design'}),\n      onNewCatGen:()=>this.setState({newTaskCat:'gen'}),\n      newTaskText:this.state.newTaskText,\n      onNewTaskText:(e)=>this.setState({newTaskText:e.target.value}),\n      onNewTaskKey:(e)=>{ if(e.key==='Enter'){ e.preventDefault(); this.addTask(); } },\n s||s==='0') return '';\n    if(s.includes('T')){ const dt=new Date(s); if(dt.getFullYear()<1970) return ''; dt.setHours(dt.getHours()+3); return `${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}-${String(dt.getDate()).padStart(2,'0')}`; }\n    if(s.includes('-')) return s.substring(0,10);\n    if(s.includes('/')){ const p=s.split('/'); if(p.length===3) return `${p[2].substring(0,4)}-${p[1].padStart(2,'0')}-${p[0].padStart(2,'0')}`; }\n    return '';\n  }\n  isOverdue(o){ if(!o.due||o.status==='ready') return false; return new Date(o.due) < new Date(this.localDate()); }\n\n  // ---------- local overlay (persists changes across refresh, even if Sheets backend doesn't) ----------\n  OV_KEY='oo_overlay_v1';\n  loadOverlay(){ try{ const o=JSON.parse(localStorage.getItem(this.OV_KEY)); return (o&&o.f)?{f:o.f||{},del:o.del||[],add:o.add||[],t:o.t||{}}:{f:{},del:[],add:[],t:{}}; }catch(e){ return {f:{},del:[],add:[],t:{}}; } }\n  saveOverlay(ov){ try{ localStorage.setItem(this.OV_KEY, JSON.stringify(ov)); }catch(e){} }\n  setOverlay(id, patch){ const ov=this.loadOverlay(); const k=String(id); ov.f[k]={...(ov.f[k]||{}), ...patch}; ov.t=ov.t||{}; ov.t[k]=Date.now(); this.saveOverlay(ov); }\n  markDeleted(id){ const ov=this.loadOverlay(); const k=String(id); if(!ov.del.includes(k)) ov.del.push(k); delete ov.f[k]; ov.add=(ov.add||[]).filter(o=>String(o.id)!==k); this.saveOverlay(ov); }\n  addOverlayOrder(o){ const ov=this.loadOverlay(); ov.add=(ov.add||[]).filter(x=>String(x.id)!==String(o.id)); ov.add.push(o); this.saveOverlay(ov); }\n  applyOverlay(orders){\n    const ov=this.loadOverlay();\n    let changed=false;\n    ov.t=ov.t||{};\n    // self-heal: drop a local patch field once the sheet is authoritative for it.\n    // - if the sheet value already equals our patch -> synced, drop it.\n    // - if the sheet holds a non-empty value that differs AND our patch is older than the\n    //   sync window (20s) -> the backend saved something (possibly from another device),\n    //   so the sheet wins and we drop our stale local value. This is what lets two devices\n    //   converge. If the sheet field stays empty (backend not saving it), we keep the patch.\n    const SYNC_MS=20000; const now=Date.now();\n    orders.forEach(o=>{ const key=String(o.id); const p=ov.f[key]; if(!p) return;\n      const age = now - (ov.t[key]||0);\n      Object.keys(p).forEach(field=>{\n        const sv=o[field], pv=p[field];\n        if(JSON.stringify(sv)===JSON.stringify(pv)){ delete p[field]; changed=true; return; }\n        const sheetNonEmpty = sv!==undefined && sv!==null && sv!=='';\n        if(sheetNonEmpty && age>SYNC_MS){ delete p[field]; changed=true; }\n      });\n      if(!Object.keys(p).length){ delete ov.f[key]; delete ov.t[key]; changed=true; }\n    });\n    const ids=new Set(orders.map(o=>String(o.id)));\n    const stillNew=(ov.add||[]).filter(o=>!ids.has(String(o.id)));\n    if(stillNew.length!==(ov.add||[]).length){ ov.add=stillNew; changed=true; }\n    if(changed) this.saveOverlay(ov);\n    let all=[...orders, ...stillNew].filter(o=>!ov.del.includes(String(o.id)));\n    return all.map(o=> ov.f[String(o.id)] ? {...o, ...ov.f[String(o.id)]} : o);\n  }\n\n  // ---------- sync ----------\n  async loadFromSheets(){\n    this.setState({ loading:true, errored:false });\n    try{\n      const res = await fetch(this.SHEETS_URL + '?t=' + Date.now());\n      const raw = await res.json();\n      const orders = raw.map((row,i)=>{\n        const status = this.SLR[row['סטטוס']] || 'hold';\n        const id = parseInt(row['מספר']) || 1001+i;\n        if(id >= this.nextId) this.nextId = id+1;\n        return {\n          id,\n          name:  String(row['שם לקוח']||'').trim(),\n          type:  String(row['סוג עבודה']||'').trim(),\n          date:  this.fmtIn(row['תאריך כניסה']),\n          due:   this.fmtIn(row['תאריך מסירה']),\n          status,\n          notes: String(row['הערות']||'').trim(),\n          phone: String(row['טלפון']||'').trim(),\n          price: String(row['מחיר']||'').trim(),\n          install: ['כן','true','TRUE','1'].includes(String(row['התקנה']||'').trim()),\n          docType: String(row['מסמך']||'').includes('חשבונית') ? 'invoice' : 'order',\n          category: String(row['קטגוריה']||'').includes('שילוט') ? 'sign' : 'print',\n          image: String(row['תמונה']||'').trim(),\n          proposal: String(row['הצעה']||'').trim(),\n          time: (()=>{ const t=String(row['שעת כניסה']||'').trim(); if(!t) return ''; if(t.includes('T')){ const dt=new Date(t); if(dt.getFullYear()<1970) return ''; dt.setHours(dt.getHours()+3); return `${String(dt.getHours()).padStart(2,'0')}:${String(dt.getMinutes()).padStart(2,'0')}`; } return t; })(),\n          urgent: ['כן','true','TRUE','1'].includes(String(row['דחוף']||'').trim())\n        };\n      }).filter(o=>o.name);\n      const merged = this.applyOverlay(orders);\n      merged.sort((a,b)=>{ const ak=(a.date||'')+(a.time||''); const bk=(b.date||'')+(b.time||''); return bk.localeCompare(ak); });\n      this.setState({ orders:merged, loading:false, errored:false });\n    }catch(e){\n      this.setState({ loading:false, errored:true });\n    }\n  }\n\n  async syncToSheets(action, data){\n    try{\n      await fetch(this.SHEETS_URL, { method:'POST', mode:'no-cors', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ action, ...data }) });\n    }catch(e){ this.showToast('שגיאה בחיבור'); }\n  }\n\n  // ---------- toast ----------\n  showToast(msg){\n    if(this._toastTimer) clearTimeout(this._toastTimer);\n    this.setState(s=>({ toast: msg, toastKey: s.toastKey+1 }));\n    this._toastTimer = setTimeout(()=> this.setState({ toast:'' }), 2500);\n  }\n\n  // ---------- clients ----------\n  getClientNames(){ return [...new Set(this.state.orders.map(o=>o.name))].sort(); }\n\n  toggleClient(name){\n    this.setState(s=>{\n      const set = new Set(s.openClients);\n      set.has(name) ? set.delete(name) : set.add(name);\n      return { openClients: [...set] };\n    });\n  }\n\n  toggleUrgent(name, e){\n    if(e) e.stopPropagation();\n    const isNow = !this.state.orders.some(o=>o.name===name && o.urgent);\n    const orders = this.state.orders.map(o=> o.name===name ? {...o, urgent:isNow} : o);\n    orders.filter(o=>o.name===name).forEach(o=> { this.setOverlay(o.id,{urgent:isNow}); this.syncToSheets('save',{order:o}); });\n    this.setState({ orders });\n    this.showToast(isNow ? 'סומן כדחוף' : 'הוסרה דחיפות');\n  }\n\n  chStatus(id, v){\n    const orders = this.state.orders.map(o=> o.id===id ? {...o, status:v} : o);\n    const o = orders.find(x=>x.id===id);\n    this.setOverlay(id, {status:v});\n    if(o) this.syncToSheets('save',{order:o});\n    this.setState({ orders });\n  }\n\n  chDoc(id, v){\n    const orders = this.state.orders.map(o=> o.id===id ? {...o, docType:v} : o);\n    const o = orders.find(x=>x.id===id);\n    this.setOverlay(id, {docType:v});\n    if(o) this.syncToSheets('save',{order:o});\n    this.setState({ orders });\n    this.showToast(v==='invoice' ? 'סומן: חשבונית הופקה' : 'סומן: הזמנה');\n  }\n\n  delOrder(id){\n    if(!confirm('למחוק?')) return;\n    this.markDeleted(id);\n    this.setState(s=>({ orders: s.orders.filter(o=>o.id!==id) }));\n    this.syncToSheets('delete',{id});\n    this.showToast('נמחקה');\n  }\n\n  // ---------- modal / form ----------\n  setField(k, v){ this.setState(s=>({ form: { ...s.form, [k]:v } })); }\n\n  // shrink an uploaded image to a small JPEG data-URL that fits in a Sheets cell, then store in form\n  handleImageFile(file){\n    if(!file){ this.showToast('לא נבחר קובץ'); return; }\n    // HTML proposal file — store as text, not an image\n    if((file.type && /html/.test(file.type)) || /\\.html?$/i.test(file.name||'')){\n      const hr = new FileReader();\n      hr.onerror = ()=> this.showToast('שגיאה בקריאת הקובץ');\n      hr.onload = (ev)=>{\n        let html = String(ev.target.result||'');\n        // light minify so borderline files fit a Sheets          this.setField('image', raw);\n          this.showToast('תמונה נוספה');\n        }\n      };\n      img.onerror = ()=>{\n        // browser can't decode (e.g. HEIC) — still try to display the raw data so user sees something\n        this.setField('image', raw);\n        this.showToast('התמונה נשמרה (פורמט מיוחד)');\n      };\n      img.src = raw;\n    };\n    reader.readAsDataURL(file);\n  }\n  onImagePick(e){ const f = e.target && e.target.files && e.target.files[0]; this.handleImageFile(f); if(e.target) e.target.value=''; }\n  onImageDrop(e){ e.preventDefault(); const f = e.dataTransfer && e.dataTransfer.files && e.dataTransfer.files[0]; this.handleImageFile(f); }\n  removeImage(e){ if(e) e.stopPropagation(); this.setField('image',''); }\n  openProposal(html){ if(!html) return; try{ const blob=new Blob([html],{type:'text/html'}); const url=URL.createObjectURL(blob); window.open(url,'_blank'); }catch(err){ this.showToast('לא ניתן לפתוח את ההצעה'); } }\n  removeProposal(e){ if(e) e.stopPropagation(); this.setField('proposal',''); }\n  openLightbox(src){ if(src) this.setState({ lightbox: src }); }\n  closeLightbox(){ this.setState({ lightbox: null }); }\n\n  openNewOrder(){\n    this.setState({ modal:'order', editJobId:null, acOpen:false, acItems:[], form: { ...this.blankForm(), date:this.localDate(), time:this.localTime() } });\n  }\n  openAddJobForClient(name, e){\n    if(e) e.stopPropagation();\n    const ex = this.state.orders.find(o=>o.name===name && o.phone);\n    this.setState({ modal:'order', editJobId:null, acOpen:false, acItems:[], form: { ...this.blankForm(), name, phone: ex?ex.phone:'', date:this.localDate(), time:this.localTime() } });\n  }\n  openEdit(id){\n    const o = this.state.orders.find(x=>x.id===id);\n    if(!o) return;\n    this.setState({ modal:'order', editJobId:id, acOpen:false, acItems:[], form: { name:o.name, phone:o.phone||'', type:o.type, price:o.price||'', date:o.date, due:o.due||'', status:o.status, install:o.install||false, docType:o.docType||'order', category:o.category||'print', image:o.image||'', proposal:o.proposal||'', notes:o.notes||'', time:o.time||'', items:this.parseNotesToItems(o.notes||'') } });\n  }\n  closeAll(){ this.setState({ modal:null, acOpen:false }); }\n\n  // autocomplete\n  onNameInput(v){\n    const val = v.trim().toLowerCase();\n    if(!val){ this.setState(s=>({ form:{...s.form, name:v}, acOpen:false, acItems:[] })); return; }\n    const matches = this.getClientNames().filter(n=>n.toLowerCase().includes(val));\n    this.setState(s=>({ form:{...s.form, name:v}, acOpen:matches.length>0, acItems:matches }));\n  }\n  selectClient(name){\n    const ex = this.state.orders.find(o=>o.name===name && o.phone);\n    this.setState(s=>({ form:{...s.form, name, phone: ex?ex.phone:s.form.phone}, acOpen:false }));\n  }\n\n  calcFromNotes(txt){\n    let total=0;\n    txt.split('\\n').forEach(line=>{\n      const mQty=line.match(/[×x\\*]\\s*(\\d+(?:\\.\\d+)?)\\s*=\\s*(\\d+(?:\\.\\d+)?)\\s*$/i);\n      if(mQty){ total += (parseFloat(mQty[1])||1)*(parseFloat(mQty[2])||0); return; }\n      const m=line.match(/=\\s*(\\d+(?:\\.\\d+)?)\\s*$/);\n      if(m) total += parseFloat(m[1])||0;\n    });\n    return total>0 ? String(total) : '';\n  }\n  onNotesInput(v){\n    const price = this.calcFromNotes(v);\n    this.setState(s=>({ form:{...s.form, notes:v, price: price!==''?price:s.form.price } }));\n  }\n\n  saveOrder(thenSum){\n    const f = this.state.form;\n    const name=f.name.trim(), type=f.type.trim(), date=f.date;\n    if(!name||!type||!date){ this.showToast('נא למלא שם לקוח, עבודה ותאריך'); return; }\n    const obj = { name, type, date, time:f.time||'', phone:(f.phone||'').trim(), price:String(f.price||'').trim(), due:f.due, status:f.status, install:!!f.install, docType:f.docType||'order', category:f.category||'print', image:f.image||'', proposal:f.proposal||'', notes:(f.notes||'').trim(), urgent:false };\n    let savedId;\n    if(this.state.editJobId){\n      const id=this.state.editJobId;\n      const orders = this.state.orders.map(o=> o.id===id ? {...o, ...obj} : o);\n      const updated = orders.find(o=>o.id===id);\n      this.setOverlay(id, { ...obj });\n      this.syncToSheets('save',{order:updated});\n      savedId=id;\n      this.setState({ orders, modal: thenSum?'sum':null, sumOrderId: thenSum?id:this.state.sumOrderId });\n      this.showToast('הזמנה עודכנה');\n    }else{\n      obj.id = this.nextId++;\n      savedId = obj.id;\n      this.addOverlayOrder(obj);\n      const orders = [obj, ...this.state.orders];\n      const set = new Set(this.state.openClients); set.add(name);\n      this.syncToSheets('save',{order:obj});\n      this.setState({ orders, openClients:[...set], modal: thenSum?'sum':null, sumOrderId: thenSum?obj.id:this.state.sumOrderId });\n      this.showToast('הזמנה נוספה');\n    }\n  }\n  saveAndSendWA(){ this.saveOrder(true); }\n\n  // ---------- summary ----------\n  buildSummary(o){\n    if(!o) return '';\n    const dot = { hold:'🟣', prod:'🔵', ready:'🟢', done:'⚪' }[o.status] || '🟣';\n    const docLabel = o.docType==='invoice' ? 'חשבונית' : 'הזמנה';\n    let t='*📋 סיכום '+docLabel+'*\\n━━━━━━━━━━━━━━\\n';\n    t+='*לקוח:* '+o.name+'\\n';\n    if(o.phone) t+='*טלפון:* '+o.phone+'\\n';\n    t+='*עבודה:* '+o.type+'\\n';\n    if(o.install) t+='🔨 כולל התקנה אצל הלקוח\\n';\n    t+='*סטטוס:* '+dot+' '+(this.SL[o.status]||'בהמתנה')+'\\n';\n    t+='━━━━━━━━━━━━━━\\n';\n    t+='📅 *כניסה:* '+this.fmtDate(o.date)+'\\n';\n    if(o.due&&o.due!=='—') t+='📦 *מסירה:* '+this.fmtDate(o.due)+'\\n';\n    if(o.notes){\n      t+='\\n*פירוט עבודה:*\\n';\n      let total=0;\n      o.notes.split('\\n').forEach(line=>{\n        const mQty=line.match(/([×x\\*]\\s*(\\d+(?:\\.\\d+)?)\\s*)=\\s*(\\d+(?:\\.\\d+)?)\\s*$/i);\n        if(mQty){ const qty=parseFloat(mQty[2])||1, unit=parseFloat(mQty[3])||0, lt=Math.round(qty*unit); total+=lt; t+='• '+line.replace(/[×x\\*]\\s*\\d+(?:\\.\\d+)?\\s*=\\s*\\d+(?:\\.\\d+)?\\s*$/i,'').trim()+' × '+qty+' = '+Number(lt).toLocaleString()+' ₪\\n'; return; }\n        const m=line.match(/=\\s*(\\d+(?:\\.\\d+)?)\\s*$/);\n        if(m){ const p=parseFloat(m[1]); total+=p; t+='• '+line.replace(/=\\s*\\d+(?:\\.\\d+)?\\s*$/,'').trim()+' = '+Number(p).toLocaleString()+' ₪\\n'; }\n        else if(line.trim()) t+='• '+line+'\\n';\n      });\n      if(total>0) t+='━━━━━━━━━━━━━━\\n*💰 סה\"כ: '+Number(total).toLocaleString()+' ₪ + מע\"מ*\\n';\n    } else if(o.price){ t+='━━━━━━━━━━━━━━\\n*💰 מחיר: '+Number(o.price).toLocaleString()+' ₪ + מע\"מ*\\n'; }\n    return t.trimEnd();\n  }\n  openSum(id){ this.setState({ modal:'sum', sumOrderId:id }); }\n  copySum(){\n    const o=this.state.orders.find(x=>x.id===this.state.sumOrderId);\n    const txt=this.buildSummary(o);\n    navigator.clipboard.writeText(txt).then(()=>this.showToast('הועתק!')).catch(()=>{ const ta=document.createElement('textarea'); ta.value=txt; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta); this.showToast('הועתק!'); });\n  }\n  sendWA(){\n    const o=this.state.orders.find(x=>x.id===this.state.sumOrderId); if(!o) return;\n    const txt=encodeURIComponent(this.buildSummary(o));\n    const phone=o.phone?o.phone.replace(/\\D/g,''):'';\n    if(phone){ const num=phone.startsWith('0')?'972'+phone.substring(1):phone; window.open(`https://wa.me/${num}?text=${txt}`,'_blank'); }\n    else window.open(`https://wa.me/?text=${txt}`,'_blank');\n  }\n  sendMail(){\n    const o=this.state.orders.find(x=>x.id===this.state.sumOrderId); if(!o) return;\n    window.open(`mailto:?subject=${encodeURIComponent('סיכום הזמנה #'+o.id)}&body=${encodeURIComponent(this.buildSummary(o))}`,'_blank');\n  }\n\n  // ---------- export ----------\n  exportCSV(){\n    const orders=this.state.orders;\n    if(!orders.length){ this.showToast('אין הזמנות לייצוא'); return; }\n    const h=['מספר','שם לקוח','סוג עבודה','תאריך כניסה','תאריך מסירה','סטטוס','הערות','טלפון','מחיר','התקנה'];\n    const rows=orders.map(o=>[o.id,o.name,o.type,this.fmtDate(o.date),this.fmtDate(o.due),this.SL[o.status],o.notes||'',o.phone||'',o.price||'',o.install?'כן':'']);\n    const csv='\\uFEFF'+[h,...rows].map(r=>r.map(c=>`\"${String(c).replace(/\"/g,'\"\"')}\"`).join(',')).join('\\n');\n    const a=document.createElement('a'); a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(csv); a.download='הזמנות.csv'; a.click();\n    this.showToast('הורד בהצלחה');\n  }\n\n  // ---------- print ----------\n  docBadge(o, big){\n    const inv = o.docType==='invoice';\n    const label = inv ? 'חשבונית הופקה ✓' : 'להוציא: הזמנה';\n    const col = inv ? '#15803d' : '#b45309';\n    const bg  = inv ? '#dcfce7' : '#fef3c7';\n    if(big) return `<div style=\"text-align:center;margin-bottom:16px\"><span style=\"display:inline-block;font-size:15px;font-weight:700;padding:7px 20px;border-radius:6px;border:2px solid ${col};background:${bg};color:${col}\">${label}<\u002Fspan><\u002Fdiv>`;\n    return `<span style=\"font-size:12px;font-weight:700;padding:2px 9px;border-radius:4px;border:1px solid ${col};background:${bg};color:${col}\">${inv?'חשבונית ✓':'הזמנה'}<\u002Fspan>`;\n  }\n  rowsHtml(o){\n    let rows='', total=0;\n    if(o.notes){\n      o.notes.split('\\n').filter(l=>l.trim()).forEach(line=>{\n        const mQty=line.match(/([×x*]\\s*(\\d+(?:\\.\\d+)?)\\s*)=\\s*(\\d+(?:\\.\\d+)?)\\s*$/i);\n        if(mQty){ const qty=parseFloat(mQty[2])||1, unit=parseFloat(mQty[3])||0, lt=Math.round(qty*unit); total+=lt; const txt=line.replace(/[×x*]\\s*\\d+(?:\\.\\d+)?\\s*=\\s*\\d+(?:\\.\\d+)?\\s*$/i,'').trim(); rows+=`<tr style=\"border-bottom:1px solid #eee\"><td style=\"padding:7px 12px\">${txt}<\u002Ftd><td style=\"padding:7px 12px;text-align:center\">${qty}<\u002Ftd><td style=\"padding:7px 12px;text-align:center\">${Number(unit).toLocaleString()} ₪<\u002Ftd><td style=\"padding:7px 12px;text-align:left;font-weight:700\">${Number(lt).toLocaleString()} ₪<\u002Ftd><\u002Ftr>`; return; }\n        const m=line.match(/=\\s*(
