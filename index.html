document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

ng:32px 16px;overflow-y:auto;backdrop-filter:blur(5px);{{ sumOverlayCss }}\">\n    <div style=\"background:#13151d;border:1px solid rgba(255,255,255,0.09);border-radius:20px;padding:24px;width:100%;max-width:500px;margin-top:8px;box-shadow:0 30px 70px rgba(0,0,0,0.6)\">\n      <div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;padding-bottom:14px;border-bottom:1px solid rgba(255,255,255,0.07)\">\n        <span style=\"font-size:17px;font-weight:800;display:flex;align-items:center;gap:9px\">\n          <svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#a78bfa\" strokewidth=\"1.9\" strokelinecap=\"round\" strokelinejoin=\"round\"><path d=\"M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8M16 6l-4-4-4 4M12 2v14\"><\u002Fpath><\u002Fsvg>סיכום הזמנה\n        <\u002Fspan>\n        <button onclick=\"{{ onClose }}\" style=\"background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);cursor:pointer;color:#8a8f9e;width:32px;height:32px;border-radius:9px;display:flex;align-items:center;justify-content:center\" style-hover=\"background:rgba(255,255,255,0.1);color:#fff\">\n          <svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" strokewidth=\"2.1\" strokelinecap=\"round\"><path d=\"M18 6 6 18M6 6l12 12\"><\u002Fpath><\u002Fsvg>\n        <\u002Fbutton>\n      <\u002Fdiv>\n      <div style=\"background:#181b23;border-radius:12px;padding:16px;margin-bottom:16px;font-size:13px;line-height:1.95;white-space:pre-wrap;direction:rtl;text-align:right;border:1px solid rgba(255,255,255,0.07);color:#cfd3dd;max-height:340px;overflow-y:auto\">{{ sumText }}<\u002Fdiv>\n      <div style=\"display:flex;gap:9px;flex-wrap:wrap\">\n        <button onclick=\"{{ onCopy }}\" style=\"background:rgba(59,130,246,0.16);color:#93c5fd;border:none;padding:10px 16px;border-radius:11px;cursor:pointer;font-size:13px;font-weight:700;font-family:inherit;display:inline-flex;align-items:center;gap:6px\" style-hover=\"background:rgba(59,130,246,0.26)\">\n          <svg width=\"15\" height=\"15\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" strokewidth=\"1.9\" strokelinecap=\"round\" strokelinejoin=\"round\"><rect x=\"9\" y=\"9\" width=\"13\" height=\"13\" rx=\"2\"><\u002Frect><path d=\"M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1\"><\u002Fpath><\u002Fsvg>העתק\n        <\u002Fbutton>\n        <button onclick=\"{{ onWA }}\" style=\"background:#25D366;color:#fff;border:none;padding:10px 16px;border-radius:11px;cursor:pointer;font-size:13px;font-weight:700;font-family:inherit;display:inline-flex;align-items:center;gap:6px\" style-hover=\"background:#1fb855\">\n          <svg width=\"15\" height=\"15\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" strokewidth=\"2\" strokelinecap=\"round\" strokelinejoin=\"round\"><path d=\"M22 2 11 13M22 2l-7 20-4-9-9-4 20-7z\"><\u002Fpath><\u002Fsvg>ווטסאפ\n        <\u002Fbutton>\n        <button onclick=\"{{ onMail }}\" style=\"background:rgba(255,255,255,0.05);color:#cfd3dd;border:1px solid rgba(255,255,255,0.09);padding:10px 16px;border-radius:11px;cursor:pointer;font-size:13px;font-weight:700;font-family:inherit;display:inline-flex;align-items:center;gap:6px\" style-hover=\"background:rgba(255,255,255,0.1);color:#fff\">\n          <svg width=\"15\" height=\"15\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" strokewidth=\"1.8\" strokelinecap=\"round\" strokelinejoin=\"round\"><rect x=\"2\" y=\"4\" width=\"20\" height=\"16\" rx=\"2\"><\u002Frect><path d=\"m22 7-10 6L2 7\"><\u002Fpath><\u002Fsvg>מייל\n        <\u002Fbutton>\n      <\u002Fdiv>\n      <p style=\"margin-top:12px;font-size:11.5px;color:#5b606e\">נפתח אצלך — אין צורך בשום תוכנה נוספת<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ======= STATUS PICKER ======= -->\n  <!-- mobile bottom-sheet -->\n  <div onclick=\"{{ onCloseStatusPick }}\" style=\"position:fixed;inset:0;background:rgba(5,6,10,0.6);z-index:120;align-items:flex-end;justify-content:center;padding:0;backdrop-filter:blur(8px);animation:fadeIn .2s ease;{{ statusSheetOverlayCss }}\">\n    <div onclick=\"{{ stopProp }}\" style=\"background:linear-gradient(180deg,#1a1d27,#13151d);border:1px solid rgba(255,255,255,0.1);border-bottom:none;border-radius:24px 24px 0 0;padding:14px 16px 24px;width:100%;max-width:520px;box-shadow:0 -16px 50px rgba(0,0,0,0.55);animation:sheetUp .28s cubic-bezier(0.22,1,0.36,1)\">\n      <div style=\"width:40px;height:4px;border-radius:3px;background:rgba(255,255,255,0.16);margin:0 auto 14px\"><\u002Fdiv>\n      <div style=\"font-size:12.5px;font-weight:700;color:#7e889a;margin-bottom:12px;text-align:center;letter-spacing:.3px\">עדכון סטטוס<\u002Fdiv>\n      <div style=\"display:flex;flex-direction:column;gap:6px\">\n        <sc-for list=\"{{ statusPickItems }}\" as=\"si\" hint-placeholder-count=\"4\">\n          <div onclick=\"{{ si.onPick }}\" style=\"display:flex;align-items:center;gap:11px;padding:12px 14px;border-radius:12px;cursor:pointer;font-size:14.5px;font-weight:700;transition:background .12s;{{ si.itemCss }}\">\n            <span style=\"width:11px;height:11px;border-radius:50%;flex-shrink:0;{{ si.dotCss }}\"><\u002Fspan>\n            <span style=\"flex:1\">{{ si.label }}<\u002Fspan>\n            <sc-if value=\"{{ si.isCur }}\" hint-placeholder-val=\"{{ false }}\">\n              <svg width=\"17\" height=\"17\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" strokewidth=\"2.4\" strokelinecap=\"round\" strokelinejoin=\"round\"><path d=\"M20 6 9 17l-5-5\"><\u002Fpath><\u002Fsvg>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- desktop popover -->\n  <div onclick=\"{{ onCloseStatusPick }}\" style=\"position:fixed;inset:0;z-index:120;{{ statusPopBackdropCss }}\"><\u002Fdiv>\n  <div style=\"z-index:121;background:linear-gradient(180deg,#1f2230,#181b24);border:1px solid rgba(255,255,255,0.12);border-radius:14px;padding:6px;box-shadow:0 18px 44px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.04);transform-origin:top right;animation:popIn .16s cubic-bezier(0.22,1,0.36,1);{{ statusPopCss }}\">\n    <sc-for list=\"{{ statusPickItems }}\" as=\"si\" hint-placeholder-count=\"4\">\n      <div onclick=\"{{ si.onPick }}\" style=\"display:flex;align-items:center;gap:9px;padding:9px 12px;border-radius:9px;cursor:pointer;font-size:13.5px;font-weight:700;transition:background .12s;{{ si.itemCss }}\">\n        <span style=\"width:9px;height:9px;border-radius:50%;flex-shrink:0;{{ si.dotCss }}\"><\u002Fspan>\n        <span style=\"flex:1\">{{ si.label }}<\u002Fspan>\n        <sc-if value=\"{{ si.isCur }}\" hint-placeholder-val=\"{{ false }}\">\n          <svg width=\"15\" height=\"15\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" strokewidth=\"2.4\" strokelinecap=\"round\" strokelinejoin=\"round\"><path d=\"M20 6 9 17l-5-5\"><\u002Fpath><\u002Fsvg>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n    <\u002Fsc-for>\n  <\u002Fdiv>\n\n  <!-- ======= IMAGE LIGHTBOX ======= -->\n  <div onclick=\"{{ onCloseLightbox }}\" style=\"position:fixed;inset:0;background:rgba(5,6,10,0.92);z-index:200;align-items:center;justify-content:center;padding:28px;backdrop-filter:blur(6px);animation:fadeIn .18s ease;{{ lightboxCss }}\">\n    <div style=\"width:92vw;height:86vh;background-size:contain;background-repeat:no-repeat;background-position:center;{{ lightboxBgCss }}\"><\u002Fdiv>\n    <button onclick=\"{{ onCloseLightbox }}\" title=\"סגור\" style=\"position:fixed;top:20px;left:20px;width:42px;height:42px;border-radius:12px;border:none;cursor:pointer;background:rgba(255,255,255,0.1);color:#fff;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px)\" style-hover=\"background:rgba(255,255,255,0.2)\">\n      <svg width=\"20\" height=\"20\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" strokewidth=\"2.2\" strokelinecap=\"round\"><path d=\"M18 6 6 18M6 6l12 12\"><\u002Fpath><\u002Fsvg>\n    <\u002Fbutton>\n  <\u002Fdiv>\n\n  <!-- ======= TOAST ======= -->\n  <div style=\"position:fixed;bottom:28px;left:50%;color:#fff;font-size:13.5px;font-weight:700;padding:12px 24px;border-radius:13px;pointer-events:none;white-space:nowrap;z-index:999;box-shadow:0 8px 30px rgba(0,0,0,0.5);{{ toastCss }}\">{{ toastMsg }}<\u002Fdiv>\n<\u002Fdiv>\n<div id=\"print-area\"><\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1100,&quot;height&quot;:900},&quot;accent&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;default&quot;:&quot;violet&quot;,&quot;options&quot;:[&quot;violet&quot;,&quot;blue&quot;,&quot;green&quot;,&quot;amber&quot;,&quot;slate&quot;],&quot;tsType&quot;:&quot;string&quot;},&quot;title&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;ניהול הזמנות — בית דפוס&quot;,&quot;tsType&quot;:&quot;string&quot;}}\">\nclass Component extends DCLogic {\n  state = {\n    orders: [],\n    query: '',\n    filterStatus: '',\n    catFilter: '',\n    openClients: [],\n    loading: true,\n    errored: false,\n    modal: null,            // 'order' | 'sum' | null\n    editJobId: null,\n    sumOrderId: null,\n    form: this.blankForm(),\n    acItems: [],\n    acOpen: false,\n    toast: '',\n    toastKey: 0,\n    statusPickId: null,\n    statusPickRect: null,\n    statusPickMobile: false,\n    lightbox: null\n  };\n\n  SHEETS_URL = 'https://script.google.com/macros/s/AKfycbxe38najjS1FVDclayzsV-EBA15ZbHkjMdIlen0-UiON-qAaOqSqABx2FIdK9ncTvdr/exec';\n  SL = { hold:'בהמתנה', prod:'בייצור', ready:'מוכן', done:'נמסרה' };\n  SLR = { 'בהמתנה':'hold', 'בייצור':'prod', 'מוכן':'ready', 'נמסרה':'done' };\n  nextId = 1001;\n  _toastTimer = null;\n\n  blankForm(){\n    return { name:'', phone:'', type:'', price:'', date:this.localDate?this.localDate():'', due:'', status:'hold', install:false, docType:'order', category:'print', image:'', notes:'', time:'' };\n  }\n\n  componentDidMount(){\n    // re-seed date now that methods exist\n    this.setState({ form: { ...this.state.form, date: this.localDate(), time: this.localTime() } });\n    this.loadFromSheets();\n  }\n\n  // ---------- date helpers ----------\n  localDate(){ const d=new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }\n  localTime(){ const d=new Date(); return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`; }\n  fmtDate(d){ if(!d) return '—'; const p=String(d).split('-'); return p.length===3?`${p[2]}/${p[1]}/${p[0]}`:'—'; }\n  fmtIn(d){\n    if(!d) return '';\n    const s=String(d).trim();\n    if(!s||s==='0') return '';\n    if(s.includes('T')){ const dt=new Date(s); if(dt.getFullYear()<1970) return ''; dt.setHours(dt.getHours()+3); return `${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}-${String(dt.getDate()).padStart(2,'0')}`; }\n    if(s.includes('-')) return s.substring(0,10);\n    if(s.includes('/')){ const p=s.split('/'); if(p.length===3) return `${p[2].substring(0,4)}-${p[1].padStart(2,'0')}-${p[0].padStart(2,'0')}`; }\n    return '';\n  }\n  isOverdue(o){ if(!o.due||o.status==='ready') return false; return new Date(o.due) < new Date(this.localDate()); }\n\n  // ---------- local overlay (persists changes across refresh, even if Sheets backend doesn't) ----------\n  OV_KEY='oo_overlay_v1';\n  loadOverlay(){ try{ const o=JSON.parse(localStorage.getItem(this.OV_KEY)); return (o&&o.f)?o:{f:{},del:[],add:[]}; }catch(e){ return {f:{},del:[],add:[]}; } }\n  saveOverlay(ov){ try{ localStorage.setItem(this.OV_KEY, JSON.stringify(ov)); }catch(e){} }\n  setOverlay(id, patch){ const ov=this.loadOverlay(); const k=String(id); ov.f[k]={...(ov.f[k]||{}), ...patch}; this.saveOverlay(ov); }\n  markDeleted(id){ const ov=this.loadOverlay(); const k=String(id); if(!ov.del.includes(k)) ov.del.push(k); delete ov.f[k]; ov.add=(ov.add||[]).filter(o=>String(o.id)!==k); this.saveOverlay(ov); }\n  addOverlayOrder(o){ const ov=this.loadOverlay(); ov.add=(ov.add||[]).filter(x=>String(x.id)!==String(o.id)); ov.add.push(o); this.saveOverlay(ov); }\n  applyOverlay(orders){\n    const ov=this.loadOverlay();\n    let changed=false;\n    // self-heal: drop patches the sheet already reflects\n    orders.forEach(o=>{ const p=ov.f[String(o.id)]; if(p){ Object.keys(p).forEach(k=>{ if(JSON.stringify(o[k])===JSON.stringify(p[k])){ delete p[k]; changed=true; } }); if(!Object.keys(p).length){ delete ov.f[String(o.id)]; changed=true; } } });\n    const ids=new Set(orders.map(o=>String(o.id)));\n    const stillNew=(ov.add||[]).filter(o=>!ids.has(String(o.id)));\n    if(stillNew.length!==(ov.add||[]).length){ ov.add=stillNew; changed=true; }\n    if(changed) this.saveOverlay(ov);\n    let all=[...orders, ...stillNew].filter(o=>!ov.del.includes(String(o.id)));\n    return all.map(o=> ov.f[String(o.id)] ? {...o, ...ov.f[String(o.id)]} : o);\n  }\n\n  // ---------- sync ----------\n  async loadFromSheets(){\n    this.setState({ loading:true, errored:false });\n    try{\n      const res = await fetch(this.SHEETS_URL + '?t=' + Date.now());\n      const raw = await res.json();\n      const orders = raw.map((row,i)=>{\n        const status = this.SLR[row['סטטוס']] || 'hold';\n        const id = parseInt(row['מספר']) || 1001+i;\n        if(id >= this.nextId) this.nextId = id+1;\n        return {\n          id,\n          name:  String(row['שם לקוח']||'').trim(),\n          type:  String(row['סוג עבודה']||'').trim(),\n          date:  this.fmtIn(row['תאריך כניסה']),\n          due:   this.fmtIn(row['תאריך מסירה']),\n          status,\n          notes: String(row['הערות']||'').trim(),\n          phone: String(row['טלפון']||'').trim(),\n          price: String(row['מחיר']||'').trim(),\n          install: ['כן','true','TRUE','1'].includes(String(row['התקנה']||'').trim()),\n          docType: String(row['מסמך']||'').includes('חשבונית') ? 'invoice' : 'order',\n          category: String(row['קטגוריה']||'').includes('שילוט') ? 'sign' : 'print',\n          image: String(row['תמונה']||'').trim(),\n          time: (()=>{ const t=String(row['שעת כניסה']||'').trim(); if(!t) return ''; if(t.includes('T')){ const dt=new Date(t); if(dt.getFullYear()<1970) return ''; dt.setHours(dt.getHours()+3); return `${String(dt.getHours()).padStart(2,'0')}:${String(dt.getMinutes()).padStart(2,'0')}`; } return t; })(),\n          urgent: ['כן','true','TRUE','1'].includes(String(row['דחוף']||'').trim())\n        };\n      }).filter(o=>o.name);\n      const merged = this.applyOverlay(orders);\n      merged.sort((a,b)=>{ const ak=(a.date||'')+(a.time||''); const bk=(b.date||'')+(b.time||''); return bk.localeCompare(ak); });\n      this.setState({ orders:merged, loading:false, errored:false });\n    }catch(e){\n      this.setState({ loading:false, errored:true });\n    }\n  }\n\n  async syncToSheets(action, data){\n    try{\n      await fetch(this.SHEETS_URL, { method:'POST', mode:'no-cors', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ action, ...data }) });\n    }catch(e){ this.showToast('שגיאה בחיבור'); }\n  }\n\n  // ---------- toast ----------\n  showToast(msg){\n    if(this._toastTimer) clearTimeout(this._toastTimer);\n    this.setState(s=>({ toast: msg, toastKey: s.toastKey+1 }));\n    this._toastTimer = setTimeout(()=> this.setState({ toast:'' }), 2500);\n  }\n\n  // ---------- clients ----------\n  getClientNames(){ return [...new Set(this.state.orders.map(o=>o.name))].sort(); }\n\n  toggleClient(name){\n    this.setState(s=>{\n      const set = new Set(s.openClients);\n      set.has(name) ? set.delete(name) : set.add(name);\n      return { openClients: [...set] };\n    });\n  }\n\n  toggleUrgent(name, e){\n    if(e) e.stopPropagation();\n    const isNow = !this.state.orders.some(o=>o.name===name && o.urgent);\n    const orders = this.state.orders.map(o=> o.name===name ? {...o, urgent:isNow} : o);\n    orders.filter(o=>o.name===name).forEach(o=> { this.setOverlay(o.id,{urgent:isNow}); this.syncToSheets('save',{order:o}); });\n    this.setState({ orders });\n    this.showToast(isNow ? 'סומן כדחוף' : 'הוסרה דחיפות');\n  }\n\n  chStatus(id, v){\n    const orders = this.state.orders.map(o=> o.id===id ? {...o, status:v} : o);\n    const o = orders.find(x=>x.id===id);\n    this.setOverlay(id, {status:v});\n    if(o) this.syncToSheets('save',{order:o});\n    this.setState({ orders });\n  }\n\n  chDoc(id, v){\n    const orders = this.state.orders.map(o=> o.id===id ? {...o, docType:v} : o);\n    const o = orders.find(x=>x.id===id);\n    this.setOverlay(id, {docType:v});\n    if(o) this.syncToSheets('save',{order:o});\n    this.setState({ orders });\n    this.showToast(v==='invoice' ? 'סומן: חשבונית הופקה' : 'סומן: הזמנה');\n  }\n\n  delOrder(id){\n    if(!confirm('למחוק?')) return;\n    this.markDeleted(id);\n    this.setState(s=>({ orders: s.orders.filter(o=>o.id!==id) }));\n    this.syncToSheets('delete',{id});\n    this.showToast('נמחקה');\n  }\n\n  // ---------- modal / form ----------\n  setField(k, v){ this.setState(s=>({ form: { ...s.form, [k]:v } })); }\n\n  // shrink an uploaded image to a small JPEG data-URL that fits in a Sheets cell, then store in form\n  handleImageFile(file){\n    if(!file){ this.showToast('לא נבחר קובץ'); return; }\n    // some mobile cameras report an empty or non-standard type — be permissive\n    if(file.type && !/^image\\//.test(file.type) && !/\\.(jpe?g|png|gif|webp|heic|heif|bmp)$/i.test(file.name||'')){\n      this.showToast('קובץ תמונה בלבד'); return;\n    }\n    this.showToast('מעלה תמונה...');\n    const reader = new FileReader();\n    reader.onerror = ()=> this.showToast('שגיאה בקריאת הקובץ');\n    reader.onload = (ev)=>{\n      const raw = ev.target.result;\n      const img = new Image();\n      img.onload = ()=>{\n        try{\n          const MAX = 360;\n          let w = img.width || 360, h = img.height || 360;\n          if(w>h && w>MAX){ h = Math.round(h*MAX/w); w = MAX; }\n          else if(h>=w && h>MAX){ w = Math.round(w*MAX/h); h = MAX; }\n          const c = document.createElement('canvas'); c.width=w; c.height=h;\n          const cx = c.getContext('2d'); cx.fillStyle='#fff'; cx.fillRect(0,0,w,h); cx.drawImage(img,0,0,w,h);\n          let q = 0.6, url = c.toDataURL('image/jpeg', q);\n          while(url.length > 45000 && q > 0.3){ q -= 0.1; url = c.toDataURL('image/jpeg', q); }\n          this.setField('image', url);\n          this.showToast('תמונה נוספה');\n        }catch(err){\n          // canvas failed (rare) — keep the original so the user still sees it\n          this.setField('image', raw);\n          this.showToast('תמונה נוספה');\n        }\n      };\n      img.onerror = ()=>{\n        // browser can't decode (e.g. HEIC) — still try to display the raw data so user sees something\n        this.setField('image', raw);\n        this.showToast('התמונה נשמרה (פורמט מיוחד)');\n      };\n      img.src = raw;\n    };\n    reader.readAsDataURL(file);\n  }\n  onImagePick(e){ const f = e.target && e.target.files && e.target.files[0]; this.handleImageFile(f); if(e.target) e.target.value=''; }\n  onImageDrop(e){ e.preventDefault(); const f = e.dataTransfer && e.dataTransfer.files && e.dataTransfer.files[0]; this.handleImageFile(f); }\n  removeImage(e){ if(e) e.stopPropagation(); this.setField('image',''); }\n  openLightbox(src){ if(src) this.setState({ lightbox: src }); }\n  closeLightbox(){ this.setState({ lightbox: null }); }\n\n  openNewOrder(){\n    this.setState({ modal:'order', editJobId:null, acOpen:false, acItems:[], form: { ...this.blankForm(), date:this.localDate(), time:this.localTime() } });\n  }\n  openAddJobForClient(name, e){\n    if(e) e.stopPropagation();\n    const ex = this.state.orders.find(o=>o.name===name && o.phone);\n    this.setState({ modal:'order', editJobId:null, acOpen:false, acItems:[], form: { ...this.blankForm(), name, phone: ex?ex.phone:'', date:this.localDate(), time:this.localTime() } });\n  }\n  openEdit(id){\n    const o = this.state.orders.find(x=>x.id===id);\n    if(!o) return;\n    this.setState({ modal:'order', editJobId:id, acOpen:false, acItems:[], form: { name:o.name, phone:o.phone||'', type:o.type, price:o.price||'', date:o.date, due:o.due||'', status:o.status, install:o.install||false, docType:o.docType||'order', category:o.category||'print', image:o.image||'', notes:o.notes||'', time:o.time||'' } });\n  }\n  closeAll(){ this.setState({ modal:null, acOpen:false }); }\n\n  // autocomplete\n  onNameInput(v){\n    const val = v.trim().toLowerCase();\n    if(!val){ this.setState(s=>({ form:{...s.form, name:v}, acOpen:false, acItems:[] })); return; }\n    const matches = this.getClientNames().filter(n=>n.toLowerCase().includes(val));\n    this.setState(s=>({ form:{...s.form, name:v}, acOpen:matches.length>0, acItems:matches }));\n  }\n  selectClient(name){\n    const ex = this.state.orders.find(o=>o.name===name && o.phone);\n    this.setState(s=>({ form:{...s.form, name, phone: ex?ex.phone:s.form.phone}, acOpen:false }));\n  }\n\n  calcFromNotes(txt){\n    let total=0;\n    txt.split('\\n').forEach(line=>{\n      const mQty=line.match(/[×x\\*]\\s*(\\d+(?:\\.\\d+)?)\\s*=\\s*(\\d+(?:\\.\\d+)?)\\s*$/i);\n      if(mQty){ total += (parseFloat(mQty[1])||1)*(parseFloat(mQty[2])||0); return; }\n      const m=line.match(/=\\s*(\\d+(?:\\.\\d+)?)\\s*$/);\n      if(m) total += parseFloat(m[1])||0;\n    });\n    return total>0 ? String(total) : '';\n  }\n  onNotesInput(v){\n    const price = this.calcFromNotes(v);\n    this.setState(s=>({ form:{...s.form, notes:v, price: price!==''?price:s.form.price } }));\n  }\n\n  saveOrder(thenSum){\n    const f = this.state.form;\n    const name=f.name.trim(), type=f.type.trim(), date=f.date;\n    if(!name||!type||!date){ this.showToast('נא למלא שם לקוח, עבודה ותאריך'); return; }\n    const obj = { name, type, date, time:f.time||'', phone:(f.phone||'').trim(), price:String(f.price||'').trim(), due:f.due, status:f.status, install:!!f.install, docType:f.docType||'order', category:f.category||'print', image:f.image||'', notes:(f.notes||'').trim(), urgent:false };\n    let savedId;\n    if(this.state.editJobId){\n      const id=this.state.editJobId;\n      const orders = this.state.orders.map(o=> o.id===id ? {...o, ...obj} : o);\n      const updated = orders.find(o=>o.id===id);\n      this.setOverlay(id, { ...obj });\n      this.syncToSheets('save',{order:updated});\n      savedId=id;\n      this.setState({ orders, modal: thenSum?'sum':null, sumOrderId: thenSum?id:this.state.sumOrderId });\n      this.showToast('הזמנה עודכנה');\n    }else{\n      obj.id = this.nextId++;\n      savedId = obj.id;\n      this.addOverlayOrder(obj);\n      const orders = [obj, ...this.state.orders];\n      const set = new Set(this.state.openClients); set.add(name);\n      this.syncToSheets('save',{order:obj});\n      this.setState({ orders, openClients:[...set], modal: thenSum?'sum':null, sumOrderId: thenSum?obj.id:this.state.sumOrderId });\n      this.showToast('הזמנה נוספה');\n    }\n  }\n  saveAndSendWA(){ this.saveOrder(true); }\n\n  // ---------- summary ----------\n  buildSummary(o){\n    if(!o) return '';\n    const dot = { hold:'🟣', prod:'🔵', ready:'🟢', done:'⚪' }[o.status] || '🟣';\n    const docLabel = o.docType==='invoice' ? 'חשבונית' : 'הזמנה';\n    let t='*📋 סיכום '+docLabel+'*\\n━━━━━━━━━━━━━━\\n';\n    t+='*לקוח:* '+o.name+'\\n';\n    if(o.phone) t+='*טלפון:* '+o.phone+'\\n';\n    t+='*עבודה:* '+o.type+'\\n';\n    if(o.install) t+='🔨 כולל התקנה אצל הלקוח\\n';\n    t+='*סטטוס:* '+dot+' '+(this.SL[o.status]||'בהמתנה')+'\\n';\n    t+='━━━━━━━━━━━━━━\\n';\n    t+='📅 *כניסה:* '+this.fmtDate(o.date)+'\\n';\n    if(o.due&&o.due!=='—') t+='📦 *מסירה:* '+this.fmtDate(o.due)+'\\n';\n    if(o.notes){\n      t+='\\n*פירוט עבודה:*\\n';\n      let total=0;\n      o.notes.split('\\n').forEach(line=>{\n        const mQty=line.match(/([×x\\*]\\s*(\\d+(?:\\.\\d+)?)\\s*)=\\s*(\\d+(?:\\.\\d+)?)\\s*$/i);\n        if(mQty){ const qty=parseFloat(mQty[2])||1, unit=parseFloat(mQty[3])||0, lt=Math.round(qty*unit); total+=lt; t+='• '+line.replace(/[×x\\*]\\s*\\d+(?:\\.\\d+)?\\s*=\\s*\\d+(?:\\.\\d+)?\\s*$/i,'').trim()+' × '+qty+' = '+Number(lt).toLocaleString()+' ₪\\n'; return; }\n        const m=line.match(/=\\s*(\\d+(?:\\.\\d+)?)\\s*$/);\n        if(m){ const p=parseFloat(m[1]); total+=p; t+='• '+line.replace(/=\\s*\\d+(?:\\.\\d+)?\\s*$/,'').trim()+' = '+Number(p).toLocaleString()+' ₪\\n'; }\n        else if(line.trim()) t+='• '+line+'\\n';\n      });\n      if(total>0) t+='━━━━━━━━━━━━━━\\n*💰 סה\"כ: '+Number(total).toLocaleString()+' ₪ + מע\"מ*\\n';\n    } else if(o.price){ t+='━━━━━━━━━━━━━━\\n*💰 מחיר: '+Number(o.price).toLocaleString()+' ₪ + מע\"מ*\\n'; }\n    return t.trimEnd();\n  }\n  openSum(id){ this.setState({ modal:'sum', sumOrderId:id }); }\n  copySum(){\n    const o=this.state.orders.find(x=>x.id===this.state.sumOrderId);\n    const txt=this.buildSummary(o);\n    navigator.clipboard.writeText(txt).then(()=>this.showToast('הועתק!')).catch(()=>{ const ta=document.createElement('textarea'); ta.value=txt; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta); this.showToast('הועתק!'); });\n  }\n  sendWA(){\n    const o=this.state.orders.find(x=>x.id===this.state.sumOrderId); if(!o) return;\n    const txt=encodeURIComponent(this.buildSummary(o));\n    const phone=o.phone?o.phone.replace(/\\D/g,''):'';\n    if(phone){ const num=phone.startsWith('0')?'972'+phone.substring(1):phone; window.open(`https://wa.me/${num}?text=${txt}`,'_blank'); }\n    else window.open(`https://wa.me/?text=${txt}`,'_blank');\n  }\n  sendMail(){\n    const o=this.state.orders.find(x=>x.id===this.state.sumOrderId); if(!o) return;\n    window.open(`mailto:?subject=${encodeURIComponent('סיכום הזמנה #'+o.id)}&body=${encodeURIComponent(this.buildSummary(o))}`,'_blank');\n  }\n\n  // ---------- export ----------\n  exportCSV(){\n    const orders=this.state.orders;\n    if(!orders.length){ this.showToast('אין הזמנות לייצוא'); return; }\n    const h=['מספר','שם לקוח','סוג עבודה','תאריך כניסה','תאריך מסירה','סטטוס','הערות','טלפון','מחיר','התקנה'];\n    const rows=orders.map(o=>[o.id,o.name,o.type,this.fmtDate(o.date),this.fmtDate(o.due),this.SL[o.status],o.notes||'',o.phone||'',o.price||'',o.install?'כן':'']);\n    const csv='\\uFEFF'+[h,...rows].map(r=>r.map(c=>`\"${String(c).replace(/\"/g,'\"\"')}\"`).join(',')).join('\\n');\n    const a=document.createElement('a'); a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(csv); a.download='הזמנות.csv'; a.click();\n    this.showToast('הורד בהצלחה');\n  }\n\n  // ---------- print ----------\n  docBadge(o, big){\n    const inv = o.docType==='invoice';\n    const label = inv ? 'חשבונית הופקה ✓' : 'להוציא: הזמנה';\n    const col = inv ? '#15803d' : '#b45309';\n    const bg  = inv ? '#dcfce7' : '#fef3c7';\n    if(big) return `<div style=\"text-align:center;margin-bottom:16px\"><span style=\"display:inline-block;font-size:15px;font-weight:700;padding:7px 20px;border-radius:6px;border:2px solid ${col};background:${bg};color:${col}\">${label}<\u002Fspan><\u002Fdiv>`;\n    return `<span style=\"font-size:12px;font-weight:700;padding:2px 9px;border-radius:4px;border:1px solid ${col};background:${bg};color:${col}\">${inv?'חשבונית ✓':'הזמנה'}<\u002Fspan>`;\n  }\n  rowsHtml(o){\n    let rows='', total=0;\n    if(o.notes){\n      o.notes.split('\\n').filter(l=>l.trim()).forEach(line=>{\n        const mQty=line.match(/([×x*]\\s*(\\d+(?:\\.\\d+)?)\\s*)=\\s*(\\d+(?:\\.\\d+)?)\\s*$/i);\n        if(mQty){ const qty=parseFloat(mQty[2])||1, unit=parseFloat(mQty[3])||0, lt=Math.round(qty*unit); total+=lt; const txt=line.replace(/[×x*]\\s*\\d+(?:\\.\\d+)?\\s*=\\s*\\d+(?:\\.\\d+)?\\s*$/i,'').trim(); rows+=`<tr style=\"border-bottom:1px solid #eee\"><td style=\"padding:7px 12px\">${txt}<\u002Ftd><td style=\"padding:7px 12px;text-align:center\">${qty}<\u002Ftd><td style=\"padding:7px 12px;text-align:center\">${Number(unit).toLocaleString()} ₪<\u002Ftd><td style=\"padding:7px 12px;text-align:left;font-weight:700\">${Number(lt).toLocaleString()} ₪<\u002Ftd><\u002Ftr>`; return; }\n        const m=line.match(/=\\s*(\\d+(?:\\.\\d+)?)\\s*$/);\n        if(m){ const p=parseFloat(m[1])||0; total+=p; const txt=line.replace(/=\\s*\\d+(?:\\.\\d+)?\\s*$/,'').trim(); rows+=`<tr style=\"border-bottom:1px solid #eee\"><td style=\"padding:7px 12px\">${txt}<\u002Ftd><td style=\"padding:7px 12px;text-align:center\">1<\u002Ftd><td style=\"padding:7px 12px;text-align:center\">${Number(p).toLocaleString()} ₪<\u002Ftd><td style=\"padding:7px 12px;text-align:left;font-weight:700\">${Number(p).toLocaleString()} ₪<\u002Ftd><\u002Ftr>`; }\n        else rows+=`<tr style=\"border-bottom:1px solid #eee\"><td colspan=\"4\" style=\"padding:7px 12px\">${line}<\u002Ftd><\u002Ftr>`;\n      });\n    } else if(o.price){ const p=parseFloat(o.price)||0; total=p; rows+=`<tr><td style=\"padding:7px 12px\">${o.type}<\u002Ftd><td style=\"padding:7px 12px;text-align:center\">1<\u002Ftd><td style=\"padding:7px 12px;text-align:center\">${Number(p).toLocaleString()} ₪<\u002Ftd><td style=\"padding:7px 12px;text-align:left;font-weight:700\">${Number(p).toLocaleString()} ₪<\u002Ftd><\u002Ftr>`; }\n    return { rows, total };\n  }\n  printSingle(id){\n    const o=this.state.orders.find(x=>x.id===id); if(!o) return;\n    const now=new Date().toLocaleDateString('he-IL',{day:'2-digit',month:'2-digit',year:'numeric'});\n    const { rows, total } = this.rowsHtml(o);\n    document.getElementById('print-area').innerHTML=`<div style=\"font-family:Arial,sans-serif;direction:rtl;padding:20px;color:#000\">\n      <div style=\"text-align:center;font-size:20px;font-weight:700;margin-bottom:6px;border-bottom:2px solid #000;padding-bottom:8px\">הזמנה — בית דפוס<\u002Fdiv>\n      <div style=\"text-align:center;font-size:12px;color:#555;margin-bottom:20px\">הודפס: ${n
