document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

rack{background:transparent}\n  ::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:8px;border:2px solid #0a0b10}\n  ::-webkit-scrollbar-thumb:hover{background:rgba(255,255,255,0.18)}\n  @keyframes spin{to{transform:rotate(360deg)}}\n  @keyframes pillPulse{0%,100%{box-shadow:0 0 0 0 rgba(47,191,113,0.5)}50%{box-shadow:0 0 0 5px rgba(47,191,113,0)}}\n  @keyframes nameGlow{0%,100%{opacity:1;text-shadow:0 0 10px rgba(47,191,113,0.7)}50%{opacity:0.78;text-shadow:none}}\n  @keyframes cardGlow{0%,100%{box-shadow:0 0 0 1px rgba(47,191,113,0.7),0 0 16px rgba(47,191,113,0.25)}50%{box-shadow:0 0 0 1px rgba(255,255,255,0.06)}}\n  @keyframes toastIn{from{opacity:0;transform:translate(-50%,12px)}to{opacity:1;transform:translate(-50%,0)}}\n  @media print{\n    html,body{background:#fff !important;color-scheme:light !important}\n    #app-root{display:none !important}\n    #print-area{display:block !important;background:#fff !important;color:#000 !important}\n    @page{margin:12mm;background:#fff}\n  }\n  #print-area{display:none}\n<\u002Fstyle>\n<\u002Fhelmet>\n<div id=\"app-root\" style=\"direction:rtl;font-family:'Assistant',system-ui,sans-serif;min-height:100vh;color:#e8e9f0;background:radial-gradient(1200px 520px at 75% -12%, rgba(124,92,252,0.13), transparent 60%), #0a0b10;padding:28px 20px 80px\">\n  <div style=\"max-width:1080px;margin:0 auto\">\n\n    <!-- ======= HEADER ======= -->\n    <header style=\"display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-bottom:26px\">\n      <div style=\"display:flex;align-items:center;gap:14px\">\n        <div style=\"width:46px;height:46px;border-radius:14px;display:flex;align-items:center;justify-content:center;color:#fff;flex-shrink:0;{{ logoCss }}\">\n          <svg width=\"24\" height=\"24\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" strokewidth=\"1.9\" strokelinecap=\"round\" strokelinejoin=\"round\"><path d=\"M6 9V3h12v6\"><\u002Fpath><rect x=\"6\" y=\"14\" width=\"12\" height=\"7\" rx=\"1\"><\u002Frect><path d=\"M6 18H5a2 2 0 0 1-2-2v-3a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2v3a2 2 0 0 1-2 2h-1\"><\u002Fpath><circle cx=\"17.5\" cy=\"12.5\" r=\"0.6\" fill=\"currentColor\"><\u002Fcircle><\u002Fsvg>\n        <\u002Fdiv>\n        <div>\n          <div style=\"font-size:21px;font-weight:800;letter-spacing:-0.3px;line-height:1.1;{{ titleCss }}\">{{ shopTitle }}<\u002Fdiv>\n          <div style=\"font-size:12.5px;color:#6b7180;font-weight:500;margin-top:2px\">מערכת ניהול הזמנות פנימית<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:flex;align-items:center;gap:9px;flex-wrap:wrap\">\n        <div style=\"display:flex;align-items:center;gap:7px;background:#13161e;border:1px solid rgba(255,255,255,0.07);padding:8px 13px;border-radius:11px\">\n          <span style=\"width:9px;height:9px;border-radius:50%;display:inline-block;{{ syncDotCss }}\"><\u002Fspan>\n          <span style=\"font-size:12px;color:#8a8f9e;font-weight:600;white-space:nowrap\">{{ syncLabel }}<\u002Fspan>\n        <\u002Fdiv>\n        <button onclick=\"{{ onExport }}\" style=\"display:inline-flex;align-items:center;gap:7px;font-size:13px;font-weight:700;padding:10px 15px;border-radius:11px;cursor:pointer;border:1px solid rgba(255,255,255,0.09);background:#15181f;color:#aeb4c2;transition:all .15s\" style-hover=\"background:#1c202a;color:#e8e9f0\">\n          <svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" strokewidth=\"1.9\" strokelinecap=\"round\" strokelinejoin=\"round\"><path d=\"M12 3v12m0 0l-4-4m4 4l4-4M4 21h16\"><\u002Fpath><\u002Fsvg>\n          ייצוא Excel\n        <\u002Fbutton>\n        <button onclick=\"{{ onPrintReady }}\" style=\"display:inline-flex;align-items:center;gap:7px;font-size:13px;font-weight:700;padding:10px 15px;border-radius:11px;cursor:pointer;border:1px solid rgba(47,191,113,0.4);background:rgba(34,197,94,0.12);color:#6ee7b7;transition:all .15s\" style-hover=\"background:rgba(34,197,94,0.2)\">\n          <svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" strokewidth=\"1.9\" strokelinecap=\"round\" strokelinejoin=\"round\"><path d=\"M6 9V3h12v6\"><\u002Fpath><path d=\"M6 18H4a2 2 0 0 1-2-2v-3a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v3a2 2 0 0 1-2 2h-2\"><\u002Fpath><rect x=\"6\" y=\"14\" width=\"12\" height=\"7\" rx=\"1\"><\u002Frect><\u002Fsvg>\n          הדפס מוכנות\n        <\u002Fbutton>\n        <button onclick=\"{{ onNewOrder }}\" style=\"display:inline-flex;align-items:center;gap:7px;font-size:13px;font-weight:800;padding:10px 17px;border-radius:11px;cursor:pointer;border:none;color:#fff;transition:transform .15s;{{ newBtnCss }}\" style-hover=\"transform:translateY(-1px)\">\n          <svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" strokewidth=\"2.2\" strokelinecap=\"round\" strokelinejoin=\"round\"><path d=\"M12 5v14M5 12h14\"><\u002Fpath><\u002Fsvg>\n          הזמנה חדשה\n        <\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fheader>\n\n    <!-- ======= STATS ======= -->\n    <div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:22px\">\n      <div style=\"position:relative;background:linear-gradient(160deg,rgba(124,92,252,0.1),rgba(124,92,252,0.02));border:1px solid rgba(124,92,252,0.28);border-radius:18px;padding:18px 20px;overflow:hidden\">\n        <div style=\"display:flex;align-items:center;justify-content:space-between\">\n          <div>\n            <div style=\"font-size:34px;font-weight:800;color:#c4b5fd;line-height:1;font-variant-numeric:tabular-nums\">{{ statHold }}<\u002Fdiv>\n            <div style=\"font-size:12.5px;font-weight:700;color:#9b86d6;margin-top:7px\">בהמתנה<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"width:40px;height:40px;border-radius:12px;background:rgba(124,92,252,0.16);display:flex;align-items:center;justify-content:center;color:#a78bfa\">\n            <svg width=\"20\" height=\"20\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" strokewidth=\"1.9\" strokelinecap=\"round\" strokelinejoin=\"round\"><circle cx=\"12\" cy=\"12\" r=\"9\"><\u002Fcircle><path d=\"M12 7v5l3 2\"><\u002Fpath><\u002Fsvg>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"position:relative;background:linear-gradient(160deg,rgba(59,130,246,0.1),rgba(59,130,246,0.02));border:1px solid rgba(59,130,246,0.28);border-radius:18px;padding:18px 20px;overflow:hidden\">\n        <div style=\"display:flex;align-items:center;justify-content:space-between\">\n          <div>\n            <div style=\"font-size:34px;font-weight:800;color:#93c5fd;line-height:1;font-variant-numeric:tabular-nums\">{{ statProd }}<\u002Fdiv>\n            <div style=\"font-size:12.5px;font-weight:700;color:#6699e0;margin-top:7px\">בייצור<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"width:40px;height:40px;border-radius:12px;background:rgba(59,130,246,0.16);display:flex;align-items:center;justify-content:center;color:#60a5fa\">\n            <svg width=\"20\" height=\"20\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" strokewidth=\"1.9\" strokelinecap=\"round\" strokelinejoin=\"round\"><path d=\"M12 2v3M12 19v3M5 12H2M22 12h-3M19.07 4.93l-2.12 2.12M7.05 16.95l-2.12 2.12M19.07 19.07l-2.12-2.12M7.05 7.05 4.93 4.93\"><\u002Fpath><circle cx=\"12\" cy=\"12\" r=\"3.4\"><\u002Fcircle><\u002Fsvg>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"position:relative;background:linear-gradient(160deg,rgba(34,197,94,0.1),rgba(34,197,94,0.02));border:1px solid rgba(34,197,94,0.28);border-radius:18px;padding:18px 20px;overflow:hidden\">\n        <div style=\"display:flex;align-items:center;justify-content:space-between\">\n          <div>\n            <div style=\"font-size:34px;font-weight:800;color:#6ee7b7;line-height:1;font-variant-numeric:tabular-nums\">{{ statReady }}<\u002Fdiv>\n            <div style=\"font-size:12.5px;font-weight:700;color:#42b883;margin-top:7px\">מוכן לאיסוף<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"width:40px;height:40px;border-radius:12px;background:rgba(34,197,94,0.16);display:flex;align-items:center;justify-content:center;color:#34d399\">\n            <svg width=\"20\" height=\"20\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" strokewidth=\"2\" strokelinecap=\"round\" strokelinejoin=\"round\"><path d=\"M20 6 9 17l-5-5\"><\u002Fpath><\u002Fsvg>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- ======= CONTROLS ======= -->\n    <div style=\"display:flex;gap:10px;margin-bottom:18px;flex-wrap:wrap;align-items:center\">\n      <div style=\"position:relative;flex:1;min-width:200px\">\n        <span style=\"position:absolute;right:13px;top:50%;transform:translateY(-50%);color:#5b606e;display:flex;pointer-events:none\">\n          <svg width=\"17\" height=\"17\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" strokewidth=\"2\" strokelinecap=\"round\" strokelinejoin=\"round\"><circle cx=\"11\" cy=\"11\" r=\"7\"><\u002Fcircle><path d=\"m21 21-4.3-4.3\"><\u002Fpath><\u002Fsvg>\n        <\u002Fspan>\n        <input type=\"text\" value=\"{{ query }}\" oninput=\"{{ onSearch }}\" placeholder=\"חיפוש לפי שם לקוח...\" style=\"width:100%;direction:rtl;font-family:inherit;font-size:14px;padding:11px 40px 11px 14px;border-radius:12px;border:1px solid rgba(255,255,255,0.09);background:#13161e;color:#e8e9f0;outline:none\" style-focus=\"border-color:#7c5cfc;box-shadow:0 0 0 3px rgba(124,92,252,0.18)\">\n      <\u002Fdiv>\n      <select value=\"{{ filterStatus }}\" onchange=\"{{ onFilter }}\" style=\"min-width:150px;direction:rtl;font-family:inherit;font-size:14px;font-weight:600;padding:11px 36px 11px 14px;border-radius:12px;border:1px solid rgba(255,255,255,0.09);background-color:#13161e;color:#e8e9f0;color-scheme:dark;appearance:none;-webkit-appearance:none;-moz-appearance:none; in-bottom:14px;color:#3a3f4b\">\n          <svg width=\"26\" height=\"26\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" strokewidth=\"1.7\" strokelinecap=\"round\" strokelinejoin=\"round\"><path d=\"M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z\"><\u002Fpath><path d=\"M14 2v6h6M9 13h6M9 17h4\"><\u002Fpath><\u002Fsvg>\n        <\u002Fdiv>\n        <div style=\"font-size:14.5px;font-weight:600\">{{ emptyText }}<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <div style=\"display:flex;flex-direction:column;gap:12px\">\n      <sc-for list=\"{{ clients }}\" as=\"c\" hint-placeholder-count=\"3\">\n        <div style=\"background:#13161e;border-radius:18px;border:1px solid rgba(255,255,255,0.06);overflow:hidden;transition:border-color .25s;{{ c.cardCss }}\">\n          <!-- client header -->\n          <div onclick=\"{{ c.onToggle }}\" style=\"display:flex;align-items:center;justify-content:space-between;padding:14px 16px;cursor:pointer;user-select:none;gap:12px;transition:background .15s\" style-hover=\"background:rgba(255,255,255,0.025)\">\n            <div style=\"display:flex;align-items:center;gap:11px;flex:1;flex-wrap:wrap;min-width:0\">\n              <button onclick=\"{{ c.onToggleUrgent }}\" title=\"סמן כדחוף\" style=\"background:none;border:none;cursor:pointer;padding:2px;display:flex;line-height:1;flex-shrink:0;transition:transform .15s;{{ c.starCss }}\" style-hover=\"transform:scale(1.18)\">\n                <sc-if value=\"{{ c.isUrgent }}\" hint-placeholder-val=\"{{ true }}\">\n                  <svg width=\"20\" height=\"20\" viewBox=\"0 0 24 24\" fill=\"currentColor\" stroke=\"none\"><path d=\"M12 2.5l2.9 5.9 6.5.95-4.7 4.58 1.1 6.47L12 17.4l-5.8 3.05 1.1-6.47L2.6 9.35l6.5-.95z\"><\u002Fpath><\u002Fsvg>\n                <\u002Fsc-if>\n                <sc-if value=\"{{ c.notUrgent }}\" hint-placeholder-val=\"{{ true }}\">\n                  <svg width=\"20\" height=\"20\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"current 26px;width:100%;max-width:520px;box-shadow:0 -10px 40px rgba(0,0,0,0.5)\">\n      <div style=\"width:38px;height:4px;border-radius:3px;background:rgba(255,255,255,0.18);margin:0 auto 16px\"><\u002Fdiv>\n      <div style=\"font-size:14px;font-weight:800;color:#9aa1b0;margin-bottom:14px;text-align:center\">בחר סטטוס להזמנה<\u002Fdiv>\n      <div style=\"display:flex;flex-direction:column;gap:8px\">\n        <sc-for list=\"{{ statusPickItems }}\" as=\"si\" hint-placeholder-count=\"4\">\n          <div onclick=\"{{ si.onPick }}\" style=\"display:flex;align-items:center;gap:11px;padding:14px 16px;border-radius:13px;cursor:pointer;font-size:15px;font-weight:700;{{ si.itemCss }}\">\n            <span style=\"width:12px;height:12px;border-radius:50%;flex-shrink:0;{{ si.dotCss }}\"><\u002Fspan>\n            <span style=\"flex:1\">{{ si.label }}<\u002Fspan>\n            <sc-if value=\"{{ si.isCur }}\" hint-placeholder-val=\"{{ false }}\">\n              <svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" strokewidth=\"2.4\" strokelinecap=\"round\" strokelinejoin=\"round\"><path d=\"M20 6 9 17l-5-5\"><\u002Fpath><\u002Fsvg>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- desktop popover -->\n  <div onclick=\"{{ onCloseStatusPick }}\" style=\"position:fixed;inset:0;z-index:120;{{ statusPopBackdropCss }}\"><\u002Fdiv>\n  <div style=\"z-index:121;background:#1c1f28;border:1px solid rgba(255,255,255,0.12);border-radius:12px;padding:5px;box-shadow:0 14px 36px rgba(0,0,0,0.55);{{ statusPopCss }}\">\n    <sc-for list=\"{{ statusPickItems }}\" as=\"si\" hint-placeholder-count=\"4\">\n      <div onclick=\"{{ si.onPick }}\" style=\"display:flex;align-items:center;gap:9px;padding:8px 11px;border-radius:8px;cursor:pointer;font-size:13.5px;font-weight:700;{{ si.itemCss }}\">\n        <span style=\"width:9px;height:9px;border-radius:50%;flex-shrink:0;{{ si.dotCss }}\"><\u002Fspan>\n        <span style=\"flex:1\">{{ si.label }}<\u002Fspan>\n        <sc-if value=\"{{ si.isCur }}\" hint-placeholder-val=\"{{ false }}\">\n          <svg width=\"15\" height=\"15\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" strokewidth=\"2.4\" strokelinecap=\"round\" strokelinejoin=\"round\"><path d=\"M20 6 9 17l-5-5\"><\u002Fpath><\u002Fsvg>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n    <\u002Fsc-for>\n  <\u002Fdiv>\n\n  <!-- ======= TOAST ======= -->\n  <div style=\"position:fixed;bottom:28px;left:50%;color:#fff;font-size:13.5px;font-weight:700;padding:12px 24px;border-radius:13px;pointer-events:none;white-space:nowrap;z-index:999;box-shadow:0 8px 30px rgba(0,0,0,0.5);{{ toastCss }}\">{{ toastMsg }}<\u002Fdiv>\n<\u002Fdiv>\n<div id=\"print-area\"><\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1100,&quot;height&quot;:900},&quot;accent&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;default&quot;:&quot;violet&quot;,&quot;options&quot;:[&quot;violet&quot;,&quot;blue&quot;,&quot;green&quot;,&quot;amber&quot;,&quot;slate&quot;],&quot;tsType&quot;:&quot;string&quot;},&quot;title&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;ניהול הזמנות — בית דפוס&quot;,&quot;tsType&quot;:&quot;string&quot;}}\">\nclass Component extends DCLogic {\n  state = {\n    orders: [],\n    query: '',\n    filterStatus: '',\n    openClients: [],\n    loading: true,\n    errored: false,\n    modal: null,            // 'order' | 'sum' | null\n    editJobId: null,\n    sumOrderId: null,\n    form: this.blankForm(),\n    acItems: [],\n    acOpen: false,\n    toast: '',\n    toastKey: 0,\n    statusPickId: null,\n    statusPickRect: null,\n    statusPickMobile: false\n  };\n\n  SHEETS_URL = 'https://script.google.com/macros/s/AKfycbwcAK1rZeXIefSUnUxr9wRR3P_TXADOq5m4X8e2aZxeSTiJoQdUFGaFd5lcml7Oh9JQ/exec';\n  SL = { hold:'בהמתנה', prod:'בייצור', ready:'מוכן', done:'נמסרה' };\n  SLR = { 'בהמתנה':'hold', 'בייצור':'prod', 'מוכן':'ready', 'נמסרה':'done' };\n  nextId = 1001;\n  _toastTimer = null;\n\n  blankForm(){\n    return { name:'', phone:'', type:'', price:'', date:this.localDate?this.localDate():'', due:'', status:'hold', install:false, docType:'order', notes:'', time:'' };\n  }\n\n  componentDidMount(){\n    // re-seed date now that methods exist\n    this.setState({ form: { ...this.state.form, date: this.localDate(), time: this.localTime() } });\n    this.loadFromSheets();\n  }\n\n  // ---------- date helpers ----------\n  localDate(){ const d=new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }\n  localTime(){ const d=new Date(); return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`; }\n  fmtDate(d){ if(!d) return '—'; const p=String(d).split('-'); return p.length===3?`${p[2]}/${p[1]}/${p[0]}`:'—'; }\n  fmtIn(d){\n    if(!d) return '';\n    const s=String(d).trim();\n    if(!s||s==='0') return '';\n    if(s.includes('T')){ const dt=new Date(s); if(dt.getFullYear()<1970) return ''; dt.setHours(dt.getHours()+3); return `${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}-${String(dt.getDate()).padStart(2,'0')}`; }\n    if(s.includes('-')) return s.substring(0,10);\n    if(s.includes('/')){ const p=s.split('/'); if(p.length===3) return `${p[2].substring(0,4)}-${p[1].padStart(2,'0')}-${p[0].padStart(2,'0')}`; }\n    return '';\n  }\n  isOverdue(o){ if(!o.due||o.status==='ready') return false; return new Date(o.due) < new Date(this.localDate()); }\n\n  // ---------- local overlay (persists changes across refresh, even if Sheets backend doesn't) ----------\n  OV_KEY='oo_overlay_v1';\n  loadOverlay(){ try{ const o=JSON.parse(localStorage.getItem(this.OV_KEY)); return (o&&o.f)?o:{f:{},del:[],add:[]}; }catch(e){ return {f:{},del:[],add:[]}; } }\n  saveOverlay(ov){ try{ localStorage.setItem(this.OV_KEY, JSON.stringify(ov)); }catch(e){} }\n  setOverlay(id, patch){ const ov=this.loadOverlay(); const k=String(id); ov.f[k]={...(ov.f[k]||{}), ...patch}; this.saveOverlay(ov); }\n  markDeleted(id){ const ov=this.loadOverlay(); const k=String(id); if(!ov.del.includes(k)) ov.del.push(k); delete ov.f[k]; ov.add=(ov.add||[]).filter(o=>String(o.id)!==k); this.saveOverlay(ov); }\n  addOverlayOrder(o){ const ov=this.loadOverlay(); ov.add=(ov.add||[]).filter(x=>String(x.id)!==String(o.id)); ov.add.push(o); this.saveOverlay(ov); }\n  applyOverlay(orders){\n    const ov=this.loadOverlay();\n    let changed=false;\n    // self-heal: drop patches the sheet already reflects\n    orders.forEach(o=>{ const p=ov.f[String(o.id)]; if(p){ Object.keys(p).forEach(k=>{ if(JSON.stringify(o[k])===JSON.stringify(p[k])){ delete p[k]; changed=true; } }); if(!Object.keys(p).length){ delete ov.f[String(o.id)]; changed=true; } } });\n    const ids=new Set(orders.map(o=>String(o.id)));\n    const stillNew=(ov.add||[]).filter(o=>!ids.has(String(o.id)));\n    if(stillNew.length!==(ov.add||[]).length){ ov.add=stillNew; changed=true; }\n    if(changed) this.saveOverlay(ov);\n    let all=[...orders, ...stillNew].filter(o=>!ov.del.includes(String(o.id)));\n    return all.map(o=> ov.f[String(o.id)] ? {...o, ...ov.f[String(o.id)]} : o);\n  }\n\n  // ---------- sync ----------\n  async loadFromSheets(){\n    this.setState({ loading:true, errored:false });\n    try{\n      const res = await fetch(this.SHEETS_URL + '?t=' + Date.now());\n      const raw = await res.json();\n      const orders = raw.map((row,i)=>{\n        const status = this.SLR[row['סטטוס']] || 'hold';\n        const id = parseInt(row['מספר']) || 1001+i;\n        if(id >= this.nextId) this.nextId = id+1;\n        return {\n          id,\n          name:  String(row['שם לקוח']||'').trim(),\n          type:  String(row['סוג עבודה']||'').trim(),\n          date:  this.fmtIn(row['תאריך כניסה']),\n          due:   this.fmtIn(row['תאריך מסירה']),\n          status,\n          notes: String(row['הערות']||'').trim(),\n          phone: String(row['טלפון']||'').trim(),\n          price: String(row['מחיר']||'').trim(),\n          install: ['כן','true','TRUE','1'].includes(String(row['התקנה']||'').trim()),\n          docType: String(row['מסמך']||'').includes('חשבונית') ? 'invoice' : 'order',\n          time: (()=>{ const t=String(row['שעת כניסה']||'').trim(); if(!t) return ''; if(t.includes('T')){ const dt=new Date(t); if(dt.getFullYear()<1970) return ''; dt.setHours(dt.getHours()+3); return `${String(dt.getHours()).padStart(2,'0')}:${String(dt.getMinutes()).padStart(2,'0')}`; } return t; })(),\n          urgent: ['כן','true','TRUE','1'].includes(String(row['דחוף']||'').trim())\n        };\n      }).filter(o=>o.name);\n      const merged = this.applyOverlay(orders);\n      merged.sort((a,b)=>{ const ak=(a.date||'')+(a.time||''); const bk=(b.date||'')+(b.time||''); return bk.localeCompare(ak); });\n      this.setState({ orders:merged, loading:false, errored:false });\n    }catch(e){\n      this.setState({ loading:false, errored:true });\n    }\n  }\n\n  async syncToSheets(action, data){\n    try{\n      await fetch(this.SHEETS_URL, { method:'POST', mode:'no-cors', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ action, ...data }) });\n    }catch(e){ this.showToast('שגיאה בחיבור'); }\n  }\n\n  // ---------- toast ----------\n  showToast(msg){\n    if(this._toastTimer) clearTimeout(this._toastTimer);\n    this.setState(s=>({ toast: msg, toastKey: s.toastKey+1 }));\n    this._toastTimer = setTimeout(()=> this.setState({ toast:'' }), 2500);\n  }\n\n  // ---------- clients ----------\n  getClientNames(){ return [...new Set(this.state.orders.map(o=>o.name))].sort(); }\n\n  toggleClient(name){\n    this.setState(s=>{\n      const set = new Set(s.openClients);\n      set.has(name) ? set.delete(name) : set.add(name);\n      return { openClients: [...set] };\n    });\n  }\n\n  toggleUrgent(name, e){\n    if(e) e.stopPropagation();\n    const isNow = !this.state.orders.some(o=>o.name===name && o.urgent);\n    const orders = this.state.orders.map(o=> o.name===name ? {...o, urgent:isNow} : o);\n    orders.filter(o=>o.name===name).forEach(o=> { this.setOverlay(o.id,{urgent:isNow}); this.syncToSheets('save',{order:o}); });\n    this.setState({ orders });\n    this.showToast(isNow ? 'סומן כדחוף' : 'הוסרה דחיפות');\n  }\n\n  chStatus(id, v){\n    const orders = this.state.orders.map(o=> o.id===id ? {...o, status:v} : o);\n    const o = orders.find(x=>x.id===id);\n    this.setOverlay(id, {status:v});\n    if(o) this.syncToSheets('save',{order:o});\n    this.setState({ orders });\n  }\n\n  chDoc(id, v){\n    const orders = this.state.orders.map(o=> o.id===id ? {...o, docType:v} : o);\n    const o = orders.find(x=>x.id===id);\n    this.setOverlay(id, {docType:v});\n    if(o) this.syncToSheets('save',{order:o});\n    this.setState({ orders });\n    this.showToast(v==='invoice' ? 'סומן: חשבונית הופקה' : 'סומן: הזמנה');\n  }\n\n  delOrder(id){\n    if(!confirm('למחוק?')) return;\n    this.markDeleted(id);\n    this.setState(s=>({ orders: s.orders.filter(o=>o.id!==id) }));\n    this.syncToSheets('delete',{id});\n    this.showToast('נמחקה');\n  }\n\n  // ---------- modal / form ----------\n  setField(k, v){ this.setState(s=>({ form: { ...s.form, [k]:v } })); }\n\n  openNewOrder(){\n    this.setState({ modal:'order', editJobId:null, acOpen:false, acItems:[], form: { ...this.blankForm(), date:this.localDate(), time:this.localTime() } });\n  }\n  openAddJobForClient(name, e){\n    if(e) e.stopPropagation();\n    const ex = this.state.orders.find(o=>o.name===name && o.phone);\n    this.setState({ modal:'order', editJobId:null, acOpen:false, acItems:[], form: { ...this.blankForm(), name, phone: ex?ex.phone:'', date:this.localDate(), time:this.localTime() } });\n  }\n  openEdit(id){\n    const o = this.state.orders.find(x=>x.id===id);\n    if(!o) return;\n    this.setState({ modal:'order', editJobId:id, acOpen:false, acItems:[], form: { name:o.name, phone:o.phone||'', type:o.type, price:o.price||'', date:o.date, due:o.due||'', status:o.status, install:o.install||false, docType:o.docType||'order', notes:o.notes||'', time:o.time||'' } });\n  }\n  closeAll(){ this.setState({ modal:null, acOpen:false }); }\n\n  // autocomplete\n  onNameInput(v){\n    const val = v.trim().toLowerCase();\n    if(!val){ this.setState(s=>({ form:{...s.form, name:v}, acOpen:false, acItems:[] })); return; }\n    const matches = this.getClientNames().filter(n=>n.toLowerCase().includes(val));\n    this.setState(s=>({ form:{...s.form, name:v}, acOpen:matches.length>0, acItems:matches }));\n  }\n  selectClient(name){\n    const ex = this.state.orders.find(o=>o.name===name && o.phone);\n    this.setState(s=>({ form:{...s.form, name, phone: ex?ex.phone:s.form.phone}, acOpen:false }));\n  }\n\n  calcFromNotes(txt){\n    let total=0;\n    txt.split('\\n').forEach(line=>{\n      const mQty=line.match(/[×x\\*]\\s*(\\d+(?:\\.\\d+)?)\\s*=\\s*(\\d+(?:\\.\\d+)?)\\s*$/i);\n      if(mQty){ total += (parseFloat(mQty[1])||1)*(parseFloat(mQty[2])||0); return; }\n      const m=line.match(/=\\s*(\\d+(?:\\.\\d+)?)\\s*$/);\n      if(m) total += parseFloat(m[1])||0;\n    });\n    return total>0 ? String(total) : '';\n  }\n  onNotesInput(v){\n    const price = this.calcFromNotes(v);\n    this.setState(s=>({ form:{...s.form, notes:v, price: price!==''?price:s.form.price } }));\n  }\n\n  saveOrder(thenSum){\n    const f = this.state.form;\n    const name=f.name.trim(), type=f.type.trim(), date=f.date;\n    if(!name||!type||!date){ this.showToast('נא למלא שם לקוח, עבודה ותאריך'); return; }\n    const obj = { name, type, date, time:f.time||'', phone:(f.phone||'').trim(), price:String(f.price||'').trim(), due:f.due, status:f.status, install:!!f.install, docType:f.docType||'order', notes:(f.notes||'').trim(), urgent:false };\n    let savedId;\n    if(this.state.editJobId){\n      const id=this.state.editJobId;\n      const orders = this.state.orders.map(o=> o.id===id ? {...o, ...obj} : o);\n      const updated = orders.find(o=>o.id===id);\n      this.setOverlay(id, { ...obj });\n      this.syncToSheets('save',{order:updated});\n      savedId=id;\n      this.setState({ orders, modal: thenSum?'sum':null, sumOrderId: thenSum?id:this.state.sumOrderId });\n      this.showToast('הזמנה עודכנה');\n    }else{\n      obj.id = this.nextId++;\n      savedId = obj.id;\n      this.addOverlayOrder(obj);\n      const orders = [obj, ...this.state.orders];\n      const set = new Set(this.state.openClients); set.add(name);\n      this.syncToSheets('save',{order:obj});\n      this.setState({ orders, openClients:[...set], modal: thenSum?'sum':null, sumOrderId: thenSum?obj.id:this.state.sumOrderId });\n      this.showToast('הזמנה נוספה');\n    }\n  }\n  saveAndSendWA(){ this.saveOrder(true); }\n\n  // ---------- summary ----------\n  buildSummary(o){\n    if(!o) return '';\n    const dot = { hold:'🟣', prod:'🔵', ready:'🟢', done:'⚪' }[o.status] || '🟣';\n    const docLabel = o.docType==='invoice' ? 'חשבונית' : 'הזמנה';\n    let t='*📋 סיכום '+docLabel+'*\\n━━━━━━━━━━━━━━\\n';\n    t+='*לקוח:* '+o.name+'\\n';\n    if(o.phone) t+='*טלפון:* '+o.phone+'\\n';\n    t+='*עבודה:* '+o.type+'\\n';\n    if(o.install) t+='🔨 כולל התקנה אצל הלקוח\\n';\n    t+='*סטטוס:* '+dot+' '+(this.SL[o.status]||'בהמתנה')+'\\n';\n    t+='━━━━━━━━━━━━━━\\n';\n    t+='📅 *כניסה:* '+this.fmtDate(o.date)+'\\n';\n    if(o.due&&o.due!=='—') t+='📦 *מסירה:* '+this.fmtDate(o.due)+'\\n';\n    if(o.notes){\n      t+='\\n*פירוט עבודה:*\\n';\n      let total=0;\n      o.notes.split('\\n').forEach(line=>{\n        const mQty=line.match(/([×x\\*]\\s*(\\d+(?:\\.\\d+)?)\\s*)=\\s*(\\d+(?:\\.\\d+)?)\\s*$/i);\n        if(mQty){ const qty=parseFloat(mQty[2])||1, unit=parseFloat(mQty[3])||0, lt=Math.round(qty*unit); total+=lt; t+='• '+line.replace(/[×x\\*]\\s*\\d+(?:\\.\\d+)?\\s*=\\s*\\d+(?:\\.\\d+)?\\s*$/i,'').trim()+' × '+qty+' = '+Number(lt).toLocaleString()+' ₪\\n'; return; }\n        const m=line.match(/=\\s*(\\d+(?:\\.\\d+)?)\\s*$/);\n        if(m){ const p=parseFloat(m[1]); total+=p; t+='• '+line.replace(/=\\s*\\d+(?:\\.\\d+)?\\s*$/,'').trim()+' = '+Number(p).toLocaleString()+' ₪\\n'; }\n        else if(line.trim()) t+='• '+line+'\\n';\n      });\n      if(total>0) t+='━━━━━━━━━━━━━━\\n*💰 סה\"כ: '+Number(total).toLocaleString()+' ₪ + מע\"מ*\\n';\n    } else if(o.price){ t+='━━━━━━━━━━━━━━\\n*💰 מחיר: '+Number(o.price).toLocaleString()+' ₪ + מע\"מ*\\n'; }\n    return t.trimEnd();\n  }\n  openSum(id){ this.setState({ modal:'sum', sumOrderId:id }); }\n  copySum(){\n    const o=this.state.orders.find(x=>x.id===this.state.sumOrderId);\n    const txt=this.buildSummary(o);\n    navigator.clipboard.writeText(txt).then(()=>this.showToast('הועתק!')).catch(()=>{ const ta=document.createElement('textarea'); ta.value=txt; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta); this.showToast('הועתק!'); });\n  }\n  sendWA(){\n    const o=this.state.orders.find(x=>x.id===this.state.sumOrderId); if(!o) return;\n    const txt=encodeURIComponent(this.buildSummary(o));\n    const phone=o.phone?o.phone.replace(/\\D/g,''):'';\n    if(phone){ const num=phone.startsWith('0')?'972'+phone.substring(1):phone; window.open(`https://wa.me/${num}?text=${txt}`,'_blank'); }\n    else window.open(`https://wa.me/?text=${txt}`,'_blank');\n  }\n  sendMail(){\n    const o=this.state.orders.find(x=>x.id===this.state.sumOrderId); if(!o) return;\n    window.open(`mailto:?subject=${encodeURIComponent('סיכום הזמנה #'+o.id)}&body=${encodeURIComponent(this.buildSummary(o))}`,'_blank');\n  }\n\n  // ---------- export ----------\n  exportCSV(){\n    const orders=this.state.orders;\n    if(!orders.length){ this.showToast('אין הזמנות לייצוא'); return; }\n    const h=['מספר','שם לקוח','סוג עבודה','תאריך כניסה','תאריך מסירה','סטטוס','הערות','טלפון','מחיר','התקנה'];\n    const rows=orders.map(o=>[o.id,o.name,o.type,this.fmtDate(o.date),this.fmtDate(o.due),this.SL[o.status],o.notes||'',o.phone||'',o.price||'',o.install?'כן':'']);\n    const csv='\\uFEFF'+[h,...rows].map(r=>r.map(c=>`\"${String(c).replace(/\"/g,'\"\"')}\"`).join(',')).join('\\n');\n    const a=document.createElement('a'); a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(csv); a.download='הזמנות.csv'; a.click();\n    this.showToast('הורד בהצלחה');\n  }\n\n  // ---------- print ----------\n  docBadge(o, big){\n    const inv = o.docType==='invoice';\n    const label = inv ? 'חשבונית הופקה ✓' : 'להוציא: הזמנה';\n    const col = inv ? '#15803d' : '#b45309';\n    const bg  = inv ? '#dcfce7' : '#fef3c7';\n    if(big) return `<div style=\"text-align:center;margin-bottom:16px\"><span style=\"display:inline-block;font-size:15px;font-weight:700;padding:7px 20px;border-radius:6px;border:2px solid ${col};background:${bg};color:${col}\">${label}<\u002Fspan><\u002Fdiv>`;\n    return `<span style=\"font-size:12px;font-weight:700;padding:2px 9px;border-radius:4px;border:1px solid ${col};background:${bg};color:${col}\">${inv?'חשבונית ✓':'הזמנה'}<\u002Fspan>`;\n  }\n  rowsHtml(o){\n    let rows='', total=0;\n    if(o.notes){\n      o.notes.split('\\n').filter(l=>l.trim()).forEach(line=>{\n        const mQty=line.match(/([×x*]\\s*(\\d+(?:\\.\\d+)?)\\s*)=\\s*(\\d+(?:\\.\\d+)?)\\s*$/i);\n        if(mQty){ const qty=parseFloat(mQty[2])||1, unit=parseFloat(mQty[3])||0, lt=Math.round(qty*unit); total+=lt; const txt=line.replace(/[×x*]\\s*\\d+(?:\\.\\d+)?\\s*=\\s*\\d+(?:\\.\\d+)?\\s*$/i,'').trim(); rows+=`<tr style=\"border-bottom:1px solid #eee\"><td style=\"padding:7px 12px\">${txt}<\u002Ftd><td style=\"padding:7px 12px;text-align:center\">${qty}<\u002Ftd><td style=\"padding:7px 12px;text-align:center\">${Number(unit).toLocaleString()} ₪<\u002Ftd><td style=\"padding:7px 12px;text-align:left;font-weight:700\">${Number(lt).toLocaleString()} ₪<\u002Ftd><\u002Ftr>`; return; }\n        const m=line.match(/=\\s*(\\d+(?:\\.\\d+)?)\
