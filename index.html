document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

rack{background:transparent}\n  ::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:8px;border:2px solid #0a0b10}\n  ::-webkit-scrollbar-thumb:hover{background:rgba(255,255,255,0.18)}\n  @keyframes spin{to{transform:rotate(360deg)}}\n  @keyframes pillPulse{0%,100%{box-shadow:0 0 0 0 rgba(47,191,113,0.5)}50%{box-shadow:0 0 0 5px rgba(47,191,113,0)}}\n  @keyframes nameGlow{0%,100%{opacity:1;text-shadow:0 0 10px rgba(47,191,113,0.7)}50%{opacity:0.78;text-shadow:none}}\n  @keyframes cardGlow{0%,100%{box-shadow:0 0 0 1px rgba(47,191,113,0.7),0 0 16px rgba(47,191,113,0.25)}50%{box-shadow:0 0 0 1px rgba(255,255,255,0.06)}}\n  @keyframes toastIn{from{opacity:0;transform:translate(-50%,12px)}to{opacity:1;transform:translate(-50%,0)}}\n  @media print{\n    #app-root{display:none !important}\n    #print-area{display:block !important}\n  }\n  #print-area{display:none}\n<\u002Fstyle>\n<\u002Fhelmet>\n<div id=\"app-root\" style=\"direction:rtl;font-family:'Assistant',system-ui,sans-serif;min-height:100vh;color:#e8e9f0;background:radial-gradient(1200px 520px at 75% -12%, rgba(124,92,252,0.13), transparent 60%), #0a0b10;padding:28px 20px 80px\">\n  <div style=\"max-width:1080px;margin:0 auto\">\n\n    <!-- ======= HEADER ======= -->\n    <header style=\"display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-bottom:26px\">\n      <div style=\"display:flex;align-items:center;gap:14px\">\n        <div style=\"width:46px;height:46px;border-radius:14px;display:flex;align-items:center;justify-content:center;color:#fff;flex-shrink:0;{{ logoCss }}\">\n          <svg width=\"24\" height=\"24\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" strokewidth=\"1.9\" strokelinecap=\"round\" strokelinejoin=\"round\"><path d=\"M6 9V3h12v6\"><\u002Fpath><rect x=\"6\" y=\"14\" width=\"12\" height=\"7\" rx=\"1\"><\u002Frect><path d=\"M6 18H5a2 2 0 0 1-2-2v-3a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2v3a2 2 0 0 1-2 2h-1\"><\u002Fpath><circle cx=\"17.5\" cy=\"12.5\" r=\"0.6\" fill=\"currentColor\"><\u002Fcircle><\u002Fsvg>\n        <\u002Fdiv>\n        <div>\n          <div style=\"font-size:21px;font-weight:800;letter-spacing:-0.3px;line-height:1.1;{{ titleCss }}\">{{ shopTitle }}<\u002Fdiv>\n          <div style=\"font-size:12.5px;color:#6b7180;font-weight:500;margin-top:2px\">מערכת ניהול הזמנות פנימית<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:flex;align-items:center;gap:9px;flex-wrap:wrap\">\n        <div style=\"display:flex;align-items:center;gap:7px;background:#13161e;border:1px solid rgba(255,255,255,0.07);padding:8px 13px;border-radius:11px\">\n          <span style=\"width:9px;height:9px;border-radius:50%;display:inline-block;{{ syncDotCss }}\"><\u002Fspan>\n          <span style=\"font-size:12px;color:#8a8f9e;font-weight:600;white-space:nowrap\">{{ syncLabel }}<\u002Fspan>\n        <\u002Fdiv>\n        <button onclick=\"{{ onExport }}\" style=\"display:inline-flex;align-items:center;gap:7px;font-size:13px;font-weight:700;padding:10px 15px;border-radius:11px;cursor:pointer;border:1px solid rgba(255,255,255,0.09);background:#15181f;color:#aeb4c2;transition:all .15s\" style-hover=\"background:#1c202a;color:#e8e9f0\">\n          <svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" strokewidth=\"1.9\" strokelinecap=\"round\" strokelinejoin=\"round\"><path d=\"M12 3v12m0 0l-4-4m4 4l4-4M4 21h16\"><\u002Fpath><\u002Fsvg>\n          ייצוא Excel\n        <\u002Fbutton>\n        <button onclick=\"{{ onPrintReady }}\" style=\"display:inline-flex;align-items:center;gap:7px;font-size:13px;font-weight:700;padding:10px 15px;border-radius:11px;cursor:pointer;border:1px solid rgba(47,191,113,0.4);background:rgba(34,197,94,0.12);color:#6ee7b7;transition:all .15s\" style-hover=\"background:rgba(34,197,94,0.2)\">\n          <svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" strokewidth=\"1.9\" strokelinecap=\"round\" strokelinejoin=\"round\"><path d=\"M6 9V3h12v6\"><\u002Fpath><path d=\"M6 18H4a2 2 0 0 1-2-2v-3a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v3a2 2 0 0 1-2 2h-2\"><\u002Fpath><rect x=\"6\" y=\"14\" width=\"12\" height=\"7\" rx=\"1\"><\u002Frect><\u002Fsvg>\n          הדפס מוכנות\n        <\u002Fbutton>\n        <button onclick=\"{{ onNewOrder }}\" style=\"display:inline-flex;align-items:center;gap:7px;font-size:13px;font-weight:800;padding:10px 17px;border-radius:11px;cursor:pointer;border:none;color:#fff;transition:transform .15s;{{ newBtnCss }}\" style-hover=\"transform:translateY(-1px)\">\n          <svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" strokewidth=\"2.2\" strokelinecap=\"round\" strokelinejoin=\"round\"><path d=\"M12 5v14M5 12h14\"><\u002Fpath><\u002Fsvg>\n          הזמנה חדשה\n        <\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fheader>\n\n    <!-- ======= STATS ======= -->\n    <div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:22px\">\n      <div style=\"position:relative;background:linear-gradient(160deg,rgba(124,92,252,0.1),rgba(124,92,252,0.02));border:1px solid rgba(124,92,252,0.28);border-radius:18px;padding:18px 20px;overflow:hidden\">\n        <div style=\"display:flex;align-items:center;justify-content:space-between\">\n          <div>\n            <div style=\"font-size:34px;font-weight:800;color:#c4b5fd;line-height:1;font-variant-numeric:tabular-nums\">{{ statHold }}<\u002Fdiv>\n            <div style=\"font-size:12.5px;font-weight:700;color:#9b86d6;margin-top:7px\">בהמתנה<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"width:40px;height:40px;border-radius:12px;background:rgba(124,92,252,0.16);display:flex;align-items:center;justify-content:center;color:#a78bfa\">\n            <svg width=\"20\" height=\"20\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" strokewidth=\"1.9\" strokelinecap=\"round\" strokelinejoin=\"round\"><circle cx=\"12\" cy=\"12\" r=\"9\"><\u002Fcircle><path d=\"M12 7v5l3 2\"><\u002Fpath><\u002Fsvg>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"position:relative;background:linear-gradient(160deg,rgba(59,130,246,0.1),rgba(59,130,246,0.02));border:1px solid rgba(59,130,246,0.28);border-radius:18px;padding:18px 20px;overflow:hidden\">\n        <div style=\"display:flex;align-items:center;justify-content:space-between\">\n          <div>\n            <div style=\"font-size:34px;font-weight:800;color:#93c5fd;line-height:1;font-variant-numeric:tabular-nums\">{{ statProd }}<\u002Fdiv>\n            <div style=\"font-size:12.5px;font-weight:700;color:#6699e0;margin-top:7px\">בייצור<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"width:40px;height:40px;border-radius:12px;background:rgba(59,130,246,0.16);display:flex;align-items:center;justify-content:center;color:#60a5fa\">\n            <svg width=\"20\" height=\"20\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" strokewidth=\"1.9\" strokelinecap=\"round\" strokelinejoin=\"round\"><path d=\"M12 2v3M12 19v3M5 12H2M22 12h-3M19.07 4.93l-2.12 2.12M7.05 16.95l-2.12 2.12M19.07 19.07l-2.12-2.12M7.05 7.05 4.93 4.93\"><\u002Fpath><circle cx=\"12\" cy=\"12\" r=\"3.4\"><\u002Fcircle><\u002Fsvg>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"position:relative;background:linear-gradient(160deg,rgba(34,197,94,0.1),rgba(34,197,94,0.02));border:1px solid rgba(34,197,94,0.28);border-radius:18px;padding:18px 20px;overflow:hidden\">\n        <div style=\"display:flex;align-items:center;justify-content:space-between\">\n          <div>\n            <div style=\"font-size:34px;font-weight:800;color:#6ee7b7;line-height:1;font-variant-numeric:tabular-nums\">{{ statReady }}<\u002Fdiv>\n            <div style=\"font-size:12.5px;font-weight:700;color:#42b883;margin-top:7px\">מוכן לאיסוף<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"width:40px;height:40px;border-radius:12px;background:rgba(34,197,94,0.16);display:flex;align-items:center;justify-content:center;color:#34d399\">\n            <svg width=\"20\" height=\"20\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" strokewidth=\"2\" strokelinecap=\"round\" strokelinejoin=\"round\"><path d=\"M20 6 9 17l-5-5\"><\u002Fpath><\u002Fsvg>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- ======= CONTROLS ======= -->\n    <div style=\"display:flex;gap:10px;margin-bottom:18px;flex-wrap:wrap;align-items:center\">\n      <div style=\"position:relative;flex:1;min-width:200px\">\n        <span style=\"position:absolute;right:13px;top:50%;transform:translateY(-50%);color:#5b606e;display:flex;pointer-events:none\">\n          <svg width=\"17\" height=\"17\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" strokewidth=\"2\" strokelinecap=\"round\" strokelinejoin=\"round\"><circle cx=\"11\" cy=\"11\" r=\"7\"><\u002Fcircle><path d=\"m21 21-4.3-4.3\"><\u002Fpath><\u002Fsvg>\n        <\u002Fspan>\n        <input type=\"text\" value=\"{{ query }}\" oninput=\"{{ onSearch }}\" placeholder=\"חיפוש לפי שם לקוח...\" style=\"width:100%;direction:rtl;font-family:inherit;font-size:14px;padding:11px 40px 11px 14px;border-radius:12px;border:1px solid rgba(255,255,255,0.09);background:#13161e;color:#e8e9f0;outline:none\" style-focus=\"border-color:#7c5cfc;box-shadow:0 0 0 3px rgba(124,92,252,0.18)\">\n      <\u002Fdiv>\n      <select value=\"{{ filterStatus }}\" onchange=\"{{ onFilter }}\" style=\"min-width:150px;direction:rtl;font-family:inherit;font-size:14px;font-weight:600;padding:11px 14px;border-radius:12px;border:1px solid rgba(255,255,255,0.09);background:#13161e;color:#e8e9f0;outline:none;cursor:pointer\" style-focus=\"border-color:#7c5cfc\">\n        <option value=\"\">כל הסטטוסים<\u002Foption>\n        <option value=\"hold\">בהמתנה<\u002Foption>\n        <option value=\"prod\">בייצור<\u002Foption>\n        <option value=\"ready\">מוכן<\u002Foption>\n      <\u002Fselect>\n    <\u002Fdiv>\n\n    <!-- ======= LIST ======= -->\n    <sc-if value=\"{{ loading }}\" hint-placeholder-val=\"{{ true }}\">\n      <div style=\"display:flex;flex-direction:column;align-items:center;gap:14px;padding:64px 0;color:#5b606e\">\n        <span style=\"width:30px;height:30px;border:3px solid rgba(255,255,255,0.12);border-top-color:#7c5cfc;border-radius:50%;display:inline-block;animation:spin .8s linear infinite\"><\u002Fspan>\n        <span style=\"font-size:14px;font-weight:600\">טוען הזמנות מ-Google Sheets...<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n    <sc-if value=\"{{ errored }}\">\n      <div style=\"text-align:center;padding:56px 20px;color:#f87171;font-size:14px;font-weight:600;background:rgba(248,113,113,0.06);border:1px solid rgba(248,113,113,0.25);border-radius:16px\">לא ניתן לטעון — בדוק חיבור אינטרנט<\u002Fdiv>\n    <\u002Fsc-if>\n    <sc-if value=\"{{ isEmpty }}\">\n      <div style=\"text-align:center;padding:64px 20px;color:#4d525f\">\n        <div style=\"width:56px;height:56px;border-radius:16px;background:#13161e;border:1px solid rgba(255,255,255,0.06);display:inline-flex;align-items:center;justify-content:center;margin-bottom:14px;color:#3a3f4b\">\n          <svg width=\"26\" height=\"26\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" strokewidth=\"1.7\" strokelinecap=\"round\" strokelinejoin=\"round\"><path d=\"M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z\"><\u002Fpath><path d=\"M14 2v6h6M9 13h6M9 17h4\"><\u002Fpath><\u002Fsvg>\n        <\u002Fdiv>\n        <div style=\"font-size:14.5px;font-weight:600\">{{ emptyText }}<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <div style=\"display:flex;flex-direction:column;gap:12px\">\n      <sc-for list=\"{{ clients }}\" as=\"c\" hint-placeholder-count=\"3\">\n        <div style=\"background:#13161e;border-radius:18px;border:1px solid rgba(255,255,255,0.06);overflow:hidden;transition:border-color .25s;           <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:12px\">\n        <div style=\"display:flex;flex-direction:column;gap:6px;margin-bottom:14px\">\n          <label style=\"font-size:11.5px;color:#7c8290;font-weight:700;letter-spacing:.4px\">טלפון<\u002Flabel>\n          <input type=\"tel\" value=\"{{ form.phone }}\" oninput=\"{{ onPhone }}\" placeholder=\"050-0000000\" style=\"width:100%;direction:rtl;font-family:inherit;font-size:14px;padding:10px 13px;border-radius:10px;border:1px solid rgba(255,255,255,0.1);background:#181b23;color:#e8e9f0;outline:none\" style-focus=\"border-color:#7c5cfc;box-shadow:0 0 0 3px rgba(124,92,252,0.18)\">\n        <\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:6px;margin-bottom:14px\">\n          <label style=\"font-size:11.5px;color:#7c8290;font-weight:700;letter-spacing:.4px\">מחיר (₪)<\u002Flabel>\n          <input type=\"number\" value=\"{{ form.price }}\" oninput=\"{{ onPrice }}\" placeholder=\"0\" min=\"0\" style=\"width:100%;direction:rtl;font-family:inherit;font-size:14px;padding:10px 13px;border-radius:10px;border:1px solid rgba(255,255,255,0.1);background:#181b23;color:#e8e9f0;outline:none\" style-focus=\"border-color:#7c5cfc;box-shadow:0 0 0 3px rgba(124,92,252,0.18)\">\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"display:flex;flex-direction:column;gap:6px;margin-bottom:14px\">\n        <label style=\"font-size:11.5px;color:#7c8290;font-weight:700;letter-spacing:.4px\">תיאור העבודה *<\u002Flabel>\n        <input type=\"text\" value=\"{{ form.type }}\" oninput=\"{{ onType }}\" placeholder=\"למשל: שלט חיצוני, קאפה, באנר...\" style=\"width:100%;direction:rtl;font-family:inherit;font-size:14px;padding:10px 13px;border-radius:10px;border:1px solid rgba(255,255,255,0.1);background:#181b23;color:#e8e9f0;outline:none\" style-focus=\"border-color:#7c5cfc;box-shadow:0 0 0 3px rgba(124,92,252,0.18)\">\n      <\u002Fdiv>\n\n      <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:12px\">\n        <div style=\"display:flex;flex-direction:column;gap:6px;margin-bottom:14px\">\n          <label style=\"font-size:11.5px;color:#7c8290;font-weight:700;letter-spacing:.4px\">תאריך כניסה *<\u002Flabel>\n          <input type=\"date\" value=\"{{ form.date }}\" oninput=\"{{ onDate }}\" style=\"width:100%;direction:rtl;font-family:inherit;font-size:14px;padding:10px 13px;border-radius:10px;border:1px solid rgba(255,255,255,0.1);background:#181b23;color:#e8e9f0;outline:none;color-scheme:dark\" style-focus=\"border-color:#7c5cfc;box-shadow:0 0 0 3px rgba(124,92,252,0.18)\">\n        <\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:6px;margin-bottom:14px\">\n          <label style=\"font-size:11.5px;color:#7c8290;font-weight:700;letter-spacing:.4px\">תאריך מסירה<\u002Flabel>\n          <input type=\"date\" value=\"{{ form.due }}\" oninput=\"{{ onDue }}\" style=\"width:100%;direction:rtl;font-family:inherit;font-size:14px;padding:10px 13px;border-radius:10px;border:1px solid rgba(255,255,255,0.1);background:#181b23;color:#e8e9f0;outline:none;color-scheme:dark\" style-focus=\"border-color:#7c5cfc;box-shadow:0 0 0 3px rgba(124,92,252,0.18)\">\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"display:flex;flex-direction:column;gap:6px;margin-bottom:14px\">\n        <label style=\"font-size:11.5px;color:#7c8290;font-weight:700;letter-spacing:.4px\">סטטוס<\u002Flabel>\n        <select value=\"{{ form.status }}\" onchange=\"{{ onStatus }}\" style=\"width:100%;direction:rtl;font-family:inherit;font-size:14px;font-weight:600;padding:10px 13px;border-radius:10px;border:1px solid rgba(255,255,255,0.1);background:#181b23;color:#e8e9f0;outline:none;cursor:pointer\" style-focus=\"border-color:#7c5cfc\">\n          <option value=\"hold\">בהמתנה<\u002Foption>\n          <option value=\"prod\">בייצור<\u002Foption>\n          <option value=\"ready\">מוכן<\u002Foption>\n          <option value=\"done\">נמסרה<\u002Foption>\n        <\u002Fselect>\n      <\u002Fdiv>\n\n      <label style=\"display:flex;align-items:center;gap:11px;background:rgba(245,165,36,0.08);border:1px solid rgba(245,165,36,0.45);border-radius:11px;padding:11px 14px;cursor:pointer;margin-bottom:14px\">\n        <input type=\"checkbox\" checked=\"{{ form.install }}\" onchange=\"{{ onInstall }}\" style=\"width:18px;height:18px;cursor:pointer;accent-color:#f5a524;flex-shrink:0\">\n        <span style=\"display:flex;align-items:center;gap:7px;font-size:13.5px;color:#fbbf24;font-weight:700\">\n          <svg width=\"15\" height=\"15\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" strokewidth=\"2\" strokelinecap=\"round\" strokelinejoin=\"round\"><path d=\"M14.7 6.3a4 4 0 0 0-5.6 5.6L3 18l3 3 6.1-6.1a4 4 0 0 0 5.6-5.6l-2.9 2.9-2.1-2.1z\"><\u002Fpath><\u002Fsvg>\n          הזמנה מצריכה התקנה שלנו\n        <\u002Fspan>\n      <\u002Flabel>\n\n      <div style=\"display:flex;flex-direction:column;gap:6px;margin-bottom:6px\">\n        <label style=\"font-size:11.5px;color:#7c8290;font-weight:700;letter-spacing:.4px\">פירוט עבודה<\u002Flabel>\n        <textarea value=\"{{ form.notes }}\" oninput=\"{{ onNotes }}\" placeholder=\"קאפה 50/70 = 100\nבאנר 300/100 = 300\" style=\"width:100%;direction:rtl;font-family:inherit;font-size:14px;padding:10px 13px;border-radius:10px;border:1px solid rgba(255,255,255,0.1);background:#181b23;color:#e8e9f0;outline:none;resize:vertical;min-height:68px;line-height:1.7\" style-focus=\"border-color:#7c5cfc;box-shadow:0 0 0 3px rgba(124,92,252,0.18)\"><\u002Ftextarea>\n        <span style=\"font-size:11px;color:#6b7180\">מספר אחרי = בסוף שורה יחושב אוטומטית<\u002Fspan>\n      <\u002Fdiv>\n\n      <div style=\"display:flex;gap:9px;justify-content:flex-end;margin-top:18px;padding-top:16px;border-top:1px solid rgba(255,255,255,0.07);flex-wrap:wrap\">\n        <button onclick=\"{{ onClose }}\" style=\"background:rgba(255,255,255,0.04);color:#8a8f9e;border:1px solid rgba(255,255,255,0.09);padding:10px 18px;border-radius:11px;cursor:pointer;font-size:13px;font-weight:700;font-family:inherit\" style-hover=\"color:#fff;background:rgba(255,255,255,0.08)\">ביטול<\u002Fbutton>\n        <button onclick=\"{{ onSaveWA }}\" style=\"background:#25D366;color:#fff;border:none;padding:10px 18px;border-radius:11px;cursor:pointer;font-size:13px;font-weight:800;font-family:inherit;display:inline-flex;align-items:center;gap:7px;box-shadow:0 4px 14px rgba(37,211,102,0.3)\" style-hover=\"background:#1fb855\">\n          <svg width=\"15\" height=\"15\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" strokewidth=\"2\" strokelinecap=\"round\" strokelinejoin=\"round\"><path d=\"M22 2 11 13M22 2l-7 20-4-9-9-4 20-7z\"><\u002Fpath><\u002Fsvg>שמור ושלח\n        <\u002Fbutton>\n        <button onclick=\"{{ onSave }}\" style=\"color:#fff;border:none;padding:10px 22px;border-radius:11px;cursor:pointer;font-size:13px;font-weight:800;font-family:inherit;{{ saveBtnCss }}\">שמור הזמנה<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ======= SUMMARY MODAL ======= -->\n  <div style=\"position:fixed;inset:0;background:rgba(5,6,10,0.78);z-index:100;align-items:flex-start;justify-content:center;padding:32px 16px;overflow-y:auto;backdrop-filter:blur(5px);{{ sumOverlayCss }}\">\n    <div style=\"background:#13151d;border:1px solid rgba(255,255,255,0.09);border-radius:20px;padding:24px;width:100%;max-width:500px;margin-top:8px;box-shadow:0 30px 70px rgba(0,0,0,0.6)\">\n      <div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;padding-bottom:14px;border-bottom:1px solid rgba(255,255,255,0.07)\">\n        <span style=\"font-size:17px;font-weight:800;display:flex;align-items:center;gap:9px\">\n          <svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#a78bfa\" strokewidth=\"1.9\" strokelinecap=\"round\" strokelinejoin=\"round\"><path d=\"M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8M16 6l-4-4-4 4M12 2v14\"><\u002Fpath><\u002Fsvg>סיכום הזמנה\n        <\u002Fspan>\n        <button onclick=\"{{ onClose }}\" style=\"background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);cursor:pointer;color:#8a8f9e;width:32px;height:32px;border-radius:9px;display:flex;align-items:center;justify-content:center\" style-hover=\"background:rgba(255,255,255,0.1);color:#fff\">\n          <svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" strokewidth=\"2.1\" strokelinecap=\"round\"><path d=\"M18 6 6 18M6 6l12 12\"><\u002Fpath><\u002Fsvg>\n        <\u002Fbutton>\n      <\u002Fdiv>\n      <div style=\"background:#181b23;border-radius:12px;padding:16px;margin-bottom:16px;font-size:13px;line-height:1.95;white-space:pre-wrap;direction:rtl;text-align:right;border:1px solid rgba(255,255,255,0.07);color:#cfd3dd;max-height:340px;overflow-y:auto\">{{ sumText }}<\u002Fdiv>\n      <div style=\"display:flex;gap:9px;flex-wrap:wrap\">\n        <button onclick=\"{{ onCopy }}\" style=\"background:rgba(59,130,246,0.16);color:#93c5fd;border:none;padding:10px 16px;border-radius:11px;cursor:pointer;font-size:13px;font-weight:700;font-family:inherit;display:inline-flex;align-items:center;gap:6px\" style-hover=\"background:rgba(59,130,246,0.26)\">\n          <svg width=\"15\" height=\"15\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" strokewidth=\"1.9\" strokelinecap=\"round\" strokelinejoin=\"round\"><rect x=\"9\" y=\"9\" width=\"13\" height=\"13\" rx=\"2\"><\u002Frect><path d=\"M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1\"><\u002Fpath><\u002Fsvg>העתק\n        <\u002Fbutton>\n        <button onclick=\"{{ onWA }}\" style=\"background:#25D366;color:#fff;border:none;padding:10px 16px;border-radius:11px;cursor:pointer;font-size:13px;font-weight:700;font-family:inherit;display:inline-flex;align-items:center;gap:6px\" style-hover=\"background:#1fb855\">\n          <svg width=\"15\" height=\"15\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" strokewidth=\"2\" strokelinecap=\"round\" strokelinejoin=\"round\"><path d=\"M22 2 11 13M22 2l-7 20-4-9-9-4 20-7z\"><\u002Fpath><\u002Fsvg>ווטסאפ\n        <\u002Fbutton>\n        <button onclick=\"{{ onMail }}\" style=\"background:rgba(255,255,255,0.05);color:#cfd3dd;border:1px solid rgba(255,255,255,0.09);padding:10px 16px;border-radius:11px;cursor:pointer;font-size:13px;font-weight:700;font-family:inherit;display:inline-flex;align-items:center;gap:6px\" style-hover=\"background:rgba(255,255,255,0.1);color:#fff\">\n          <svg width=\"15\" height=\"15\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" strokewidth=\"1.8\" strokelinecap=\"round\" strokelinejoin=\"round\"><rect x=\"2\" y=\"4\" width=\"20\" height=\"16\" rx=\"2\"><\u002Frect><path d=\"m22 7-10 6L2 7\"><\u002Fpath><\u002Fsvg>מייל\n        <\u002Fbutton>\n      <\u002Fdiv>\n      <p style=\"margin-top:12px;font-size:11.5px;color:#5b606e\">נפתח אצלך — אין צורך בשום תוכנה נוספת<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ======= TOAST ======= -->\n  <div style=\"position:fixed;bottom:28px;left:50%;color:#fff;font-size:13.5px;font-weight:700;padding:12px 24px;border-radius:13px;pointer-events:none;white-space:nowrap;z-index:999;box-shadow:0 8px 30px rgba(0,0,0,0.5);{{ toastCss }}\">{{ toastMsg }}<\u002Fdiv>\n<\u002Fdiv>\n<div id=\"print-area\"><\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1100,&quot;height&quot;:900},&quot;accent&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;default&quot;:&quot;violet&quot;,&quot;options&quot;:[&quot;violet&quot;,&quot;blue&quot;,&quot;green&quot;,&quot;amber&quot;,&quot;slate&quot;],&quot;tsType&quot;:&quot;string&quot;},&quot;title&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;ניהול הזמנות — בית דפוס&quot;,&quot;tsType&quot;:&quot;string&quot;}}\">\nclass Component extends DCLogic {\n  state = {\n    orders: [],\n    query: '',\n    filterStatus: '',\n    openClients: [],\n    loading: true,\n    errored: false,\n    modal: null,            // 'order' | 'sum' | null\n    editJobId: null,\n    sumOrderId: null,\n    form: this.blankForm(),\n    acItems: [],\n    acOpen: false,\n    toast: '',\n    toastKey: 0\n  };\n\n  SHEETS_URL = 'https://script.google.com/macros/s/AKfycbxB28W3OI7M_DWM7X53WyhNZ0E_alFELxbRiS-WNXsWKnIq5LTLnpvZQRUfRLYol8_Q/exec';\n  SL = { hold:'בהמתנה', prod:'בייצור', ready:'מוכן', done:'נמסרה' };\n  SLR = { 'בהמתנה':'hold', 'בייצור':'prod', 'מוכן':'ready', 'נמסרה':'done' };\n  nextId = 1001;\n  _toastTimer = null;\n\n  blankForm(){\n    return { name:'', phone:'', type:'', price:'', date:this.localDate?this.localDate():'', due:'', status:'hold', install:false, notes:'', time:'' };\n  }\n\n  componentDidMount(){\n    // re-seed date now that methods exist\n    this.setState({ form: { ...this.state.form, date: this.localDate(), time: this.localTime() } });\n    this.loadFromSheets();\n  }\n\n  // ---------- date helpers ----------\n  localDate(){ const d=new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }\n  localTime(){ const d=new Date(); return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`; }\n  fmtDate(d){ if(!d) return '—'; const p=String(d).split('-'); return p.length===3?`${p[2]}/${p[1]}/${p[0]}`:'—'; }\n  fmtIn(d){\n    if(!d) return '';\n    const s=String(d).trim();\n    if(!s||s==='0') return '';\n    if(s.includes('T')){ const dt=new Date(s); if(dt.getFullYear()<1970) return ''; dt.setHours(dt.getHours()+3); return `${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}-${String(dt.getDate()).padStart(2,'0')}`; }\n    if(s.includes('-')) return s.substring(0,10);\n    if(s.includes('/')){ const p=s.split('/'); if(p.length===3) return `${p[2].substring(0,4)}-${p[1].padStart(2,'0')}-${p[0].padStart(2,'0')}`; }\n    return '';\n  }\n  isOverdue(o){ if(!o.due||o.status==='ready') return false; return new Date(o.due) < new Date(this.localDate()); }\n\n  // ---------- sync ----------\n  async loadFromSheets(){\n    this.setState({ loading:true, errored:false });\n    try{\n      const res = await fetch(this.SHEETS_URL + '?t=' + Date.now());\n      const raw = await res.json();\n      const orders = raw.map((row,i)=>{\n        const status = this.SLR[row['סטטוס']] || 'hold';\n        const id = parseInt(row['מספר']) || 1001+i;\n        if(id >= this.nextId) this.nextId = id+1;\n        return {\n          id,\n          name:  String(row['שם לקוח']||'').trim(),\n          type:  String(row['סוג עבודה']||'').trim(),\n          date:  this.fmtIn(row['תאריך כניסה']),\n          due:   this.fmtIn(row['תאריך מסירה']),\n          status,\n          notes: String(row['הערות']||'').trim(),\n          phone: String(row['טלפון']||'').trim(),\n          price: String(row['מחיר']||'').trim(),\n          install: ['כן','true','TRUE','1'].includes(String(row['התקנה']||'').trim()),\n          time: (()=>{ const t=String(row['שעת כניסה']||'').trim(); if(!t) return ''; if(t.includes('T')){ const dt=new Date(t); if(dt.getFullYear()<1970) return ''; dt.setHours(dt.getHours()+3); return `${String(dt.getHours()).padStart(2,'0')}:${String(dt.getMinutes()).padStart(2,'0')}`; } return t; })(),\n          urgent: ['כן','true','TRUE','1'].includes(String(row['דחוף']||'').trim())\n        };\n      }).filter(o=>o.name);\n      orders.sort((a,b)=>{ const ak=(a.date||'')+(a.time||''); const bk=(b.date||'')+(b.time||''); return bk.localeCompare(ak); });\n      this.setState({ orders, loading:false, errored:false });\n    }catch(e){\n      this.setState({ loading:false, errored:true });\n    }\n  }\n\n  async syncToSheets(action, data){\n    try{\n      await fetch(this.SHEETS_URL, { method:'POST', mode:'no-cors', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ action, ...data }) });\n    }catch(e){ this.showToast('שגיאה בחיבור'); }\n  }\n\n  // ---------- toast ----------\n  showToast(msg){\n    if(this._toastTimer) clearTimeout(this._toastTimer);\n    this.setState(s=>({ toast: msg, toastKey: s.toastKey+1 }));\n    this._toastTimer = setTimeout(()=> this.setState({ toast:'' }), 2500);\n  }\n\n  // ---------- clients ----------\n  getClientNames(){ return [...new Set(this.state.orders.map(o=>o.name))].sort(); }\n\n  toggleClient(name){\n    this.setState(s=>{\n      const set = new Set(s.openClients);\n      set.has(name) ? set.delete(name) : set.add(name);\n      return { openClients: [...set] };\n    });\n  }\n\n  toggleUrgent(name, e){\n    if(e) e.stopPropagation();\n    const isNow = !this.state.orders.some(o=>o.name===name && o.urgent);\n    const orders = this.state.orders.map(o=> o.name===name ? {...o, urgent:isNow} : o);\n    orders.filter(o=>o.name===name).forEach(o=> this.syncToSheets('save',{order:o}));\n    this.setState({ orders });\n    this.showToast(isNow ? 'סומן כדחוף' : 'הוסרה דחיפות');\n  }\n\n  chStatus(id, v){\n    const orders = this.state.orders.map(o=> o.id===id ? {...o, status:v} : o);\n    const o = orders.find(x=>x.id===id);\n    if(o) this.syncToSheets('save',{order:o});\n    this.setState({ orders });\n  }\n\n  delOrder(id){\n    if(!confirm('למחוק?')) return;\n    this.setState(s=>({ orders: s.orders.filter(o=>o.id!==id) }));\n    this.syncToSheets('delete',{id});\n    this.showToast('נמחקה');\n  }\n\n  // ---------- modal / form ----------\n  setField(k, v){ this.setState(s=>({ form: { ...s.form, [k]:v } })); }\n\n  openNewOrder(){\n    this.setState({ modal:'order', editJobId:null, acOpen:false, acItems:[], form: { ...this.blankForm(), date:this.localDate(), time:this.localTime() } });\n  }\n  openAddJobForClient(name, e){\n    if(e) e.stopPropagation();\n    const ex = this.state.orders.find(o=>o.name===name && o.phone);\n    this.setState({ modal:'order', editJobId:null, acOpen:false, acItems:[], form: { ...this.blankForm(), name, phone: ex?ex.phone:'', date:this.localDate(), time:this.localTime() } });\n  }\n  openEdit(id){\n    const o = this.state.orders.find(x=>x.id===id);\n    if(!o) return;\n    this.setState({ modal:'order', editJobId:id, acOpen:false, acItems:[], form: { name:o.name, phone:o.phone||'', type:o.type, price:o.price||'', date:o.date, due:o.due||'', status:o.status, install:o.install||false, notes:o.notes||'', time:o.time||'' } });\n  }\n  closeAll(){ this.setState({ modal:null, acOpen:false }); }\n\n  // autocomplete\n  onNameInput(v){\n    const val = v.trim().toLowerCase();\n    if(!val){ this.setState(s=>({ form:{...s.form, name:v}, acOpen:false, acItems:[] })); return; }\n    const matches = this.getClientNames().filter(n=>n.toLowerCase().includes(val));\n    this.setState(s=>({ form:{...s.form, name:v}, acOpen:matches.length>0, acItems:matches }));\n  }\n  selectClient(name){\n    const ex = this.state.orders.find(o=>o.name===name && o.phone);\n    this.setState(s=>({ form:{...s.form, name, phone: ex?ex.phone:s.form.phone}, acOpen:false }));\n  }\n\n  calcFromNotes(txt){\n    let total=0;\n    txt.split('\\n').forEach(line=>{\n      const mQty=line.match(/[×x\\*]\\s*(\\d+(?:\\.\\d+)?)\\s*=\\s*(\\d+(?:\\.\\d+)?)\\s*$/i);\n      if(mQty){ total += (parseFloat(mQty[1])||1)*(parseFloat(mQty[2])||0); return; }\n      const m=line.match(/=\\s*(\\d+(?:\\.\\d+)?)\\s*$/);\n      if(m) total += parseFloat(m[1])||0;\n    });\n    return total>0 ? String(total) : '';\n  }\n  onNotesInput(v){\n    const price = this.calcFromNotes(v);\n    this.setState(s=>({ form:{...s.form, notes:v, price: price!==''?price:s.form.price } }));\n  }\n\n  saveOrder(thenSum){\n    const f = this.state.form;\n    const name=f.name.trim(), type=f.type.trim(), date=f.date;\n    if(!name||!type||!date){ this.showToast('נא למלא שם לקוח, עבודה ותאריך'); return; }\n    const obj = { name, type, date, 12px;color:#555;margin-right:10px\">${phone}<\u002Fspan>`:''}${hasInstall?'<span style=\"font-size:11px;background:#fff3cd;color:#856404;padding:1px 7px;border-radius:3px\">התקנה<\u002Fspan>':''}<\u002Fdiv><span style=\"font-size:12px;color:#333\">${jobs.length} הזמנ${jobs.length===1?'ה':'ות'}<\u002Fspan><\u002Fdiv><table style=\"width:100%;border-collapse:collapse;font-size:13px\"><thead><tr style=\"background:#fafafa;border-bottom:1px solid #ddd\"><th style=\"padding:7px 12px;text-align:right;font-weight:600;color:#444;width:35%\">פריט<\u002Fth><th style=\"padding:7px 12px;text-align:center;font-weight:600;color:#444;width:15%\">כמות<\u002Fth><th style=\"padding:7px 12px;text-align:center;font-weight:600;color:#444;width:20%\">מחיר ליח'<\u002Fth><th style=\"padding:7px 12px;text-align:left;font-weight:600;color:#444;width:30%\">סה\"כ<\u002Fth><\u002Ftr><\u002Fthead><tbody>${rows}<\u002Ftbody><tfoot><tr style=\"background:#f5f5f5;border-top:2px solid #ccc\"><td colspan=\"3\" style=\"padding:8px 12px;font-weight:700;text-align:right\">סה\"כ ללקוח<\u002Ftd><td style=\"padding:8px 12px;font-weight:700;font-size:15px;text-align:left\">${clientTotal>0?Number(clientTotal).toLocaleString()+' ₪ + מע\"מ':'—'}<\u002Ftd><\u002Ftr><\u002Ftfoot><\u002Ftable><\u002Fdiv>`;\n    });\n    document.getElementById('print-area').innerHTML=`<div style=\"font-family:Arial,sans-serif;direction:rtl;padding:20px;color:#000\"><div style=\"text-align:center;font-size:20px;font-weight:700;margin-bottom:6px;border-bottom:2px solid #000;padding-bottom:8px\">הזמנות מוכנות לאיסוף — בית דפוס<\u002Fdiv><div style=\"text-align:center;font-size:12px;color:#555;margin-bottom:20px\">הודפס: ${now} | סה\"כ ${readyOrders.length} הזמנות | ${clientMap.size} לקוחות<\u002Fdiv>${clientBlocks}<\u002Fdiv>`;\n    window.print();\n  }\n\n  // ---------- styles ----------\n  accentMap(){\n    const m={\n      violet:{solid:'#7c5cfc',grad:'linear-gradient(135deg,#8b7cff,#6d4dfc)',ring:'rgba(124,92,252,0.4)'},\n      blue:{solid:'#2f73e8',grad:'linear-gradient(135deg,#4f8ff7,#2563eb)',ring:'rgba(47,115,232,0.4)'},\n      green:{solid:'#16a268',grad:'linear-gradient(135deg,#34d399,#0f9d58)',ring:'rgba(22,162,104,0.4)'},\n      amber:{solid:'#e08a17',grad:'linear-gradient(135deg,#f5a524,#d97706)',ring:'rgba(224,138,23,0.4)'},\n      slate:{solid:'#475569',grad:'linear-gradient(135deg,#64748b,#334155)',ring:'rgba(71,85,105,0.4)'}\n    };\n    return m[this.props.accent] || m.violet;\n  }\n  statusPalette(s){\n    const m={\n      hold:{bg:'rgba(124,92,252,0.14)',bd:'rgba(124,92,252,0.55)',fg:'#c4b5fd',dot:'#8b7cff'},\n      prod:{bg:'rgba(59,130,246,0.14)',bd:'rgba(59,130,246,0.55)',fg:'#93c5fd',dot:'#4f8ff7'},\n      ready:{bg:'rgba(34,197,94,0.14)',bd:'rgba(34,197,94,0.55)',fg:'#6ee7b7',dot:'#2fbf71'},\n      done:{bg:'rgba(148,163,184,0.12)',bd:'rgba(148,163,184,0.35)',fg:'#9aa3b2',dot:'#6b7280'}\n    };\n    return m[s] || m.hold;\n  }\n  initials(name){\n    const parts=String(name).trim().split(/\\s+/).filter(Boolean);\n    if(!parts.length) return '?';\n    if(parts.length===1) return parts[0].substring(0,2);\n    return (parts[0][0]||'')+(parts[1][0]||'');\n  }\n\n  css(o){ if(!o) return ''; return Object.keys(o).map(k=>k.replace(/[A-Z]/g,m=>'-'+m.toLowerCase())+':'+o[k]).join(';'); }\n\n  renderVals(){\n    const A=this.accentMap();\n    const orders=this.state.orders;\n    const q=(this.state.query||'').toLowerCase();\n    const fs=this.state.filterStatus||'';\n    const openSet=new Set(this.state.openClients);\n\n    // stats\n    const statHold=orders.filter(o=>o.status==='hold').length;\n    const statProd=orders.filter(o=>o.status==='prod').length;\n    const statReady=orders.filter(o=>o.status==='ready').length;\n\n    // filter + group\n    const list=orders.filter(o=> o.status!=='done' && (!q||o.name.toLowerCase().includes(q)) && (!fs||o.status===fs));\n    const map=new Map();\n    list.forEach(o=>{ if(!map.has(o.name)) map.set(o.name,[]); map.get(o.name).push(o); });\n    const isUrgentName=(n)=> orders.some(o=>o.name===n && o.urgent);\n    const sorted=[...map.entries()].sort(([a,aj],[b,bj])=>{\n      const ua=isUrgentName(a), ub=isUrgentName(b);\n      if(ua&&!ub) return -1; if(!ua&&ub) return 1;\n      const ad=aj.reduce((m,j)=>{const k=(j.date||'')+(j.time||'');return k>m?k:m;},'');\n      const bd=bj.reduce((m,j)=>{const k=(j.date||'')+(j.time||'');return k>m?k:m;},'');\n      return bd.localeCompare(ad);\n    });\n\n    const clients=sorted.map(([name,jobs])=>{\n      const isUrgent=isUrgentName(name);\n      const isOpen=openSet.has(name);\n      const allReady=jobs.length>0 && jobs.every(j=>j.status==='ready');\n      const readyCount=jobs.filter(j=>j.status==='ready').length;\n      const hasInstall=jobs.some(j=>j.install);\n      const counts={hold:0,prod:0,ready:0};\n      jobs.forEach(j=>{ if(counts[j.status]!==undefined) counts[j.status]++; });\n\n      const pills=[];\n      ['hold','prod','ready'].forEach(s=>{ if(counts[s]>0){ const p=this.statusPalette(s); pills.push({ key:s, label:counts[s]+' '+this.SL[s], pillCss:this.css({background:p.bg,border:'1px solid '+p.bd,color:p.fg}), dotCss:this.css({background:p.dot}) }); } });\n      if(hasInstall){ pills.push({ key:'install', label:'התקנה', pillCss:this.css({background:'rgba(245,165,36,0.14)',border:'1px solid rgba(245,165,36,0.5)',color:'#fbbf24'}), dotCss:this.css({background:'#f5a524'}) }); }\n\n      let cardStyle={};\n      if(allReady) cardStyle={ animation:'cardGlow 1.6s ease-in-out infinite' };\n      else if(isUrgent) cardStyle={ borderColor:'rgba(245,165,36,0.7)', boxShadow:'0 0 0 1px rgba(245,165,36,0.4)' };\n\n      const jobVals=jobs.map(o=>{\n        const od=this.isOverdue(o);\n        const p=this.statusPalette(o.status);\n        let rowStyle={};\n        if(o.status==='ready') rowStyle={ borderColor:'rgba(47,191,113,0.5)' };\n        else if(o.install) rowStyle={ borderColor:'rgba(245,165,36,0.5)' };\n        return {\n          id:o.id, type:o.type, status:o.status,\n          hasInstall:!!o.install,\n          dateLabel:this.fmtDate(o.date),\n          hasDue:!!(o.due&&o.due!=='—'),\n          dueLabel:this.fmtDate(o.due)+(od?' ⚠':''),\n          dueCss: this.css(od?{color:'#f87171',fontWeight:700}:{}),\n          hasPhone:!!o.phone, phone:o.phone||'',\n          hasPrice:!!o.price, priceLabel:o.price?Number(o.price).toLocaleString():'',\n          hasNotes:!!o.notes, notes:o.notes||'',\n          rowCss: this.css(rowStyle),\n          statusCss: this.css({ background:p.bg, border:'1px solid '+p.bd, color:p.fg, animation: o.status==='ready'?'pillPulse 1.6s ease-in-out infinite':'none' }),\n          onStatusChange:(e)=>this.chStatus(o.id, e.target.value),\n          onSum:()=>this.openSum(o.id),\n          onPrint:()=>this.printSingle(o.id),\n          onEdit:()=>this.openEdit(o.id),\n          onDel:()=>this.delOrder(o.id)\n        };\n      });\n\n      return {\n        name, initials:this.initials(name),\n        countLabel: jobs.length+' הזמנ'+(jobs.length===1?'ה':'ות'),\n        isUrgent, notUrgent:!isUrgent,\n        avatarCss: this.css(isUrgent?{background:'rgba(245,165,36,0.2)',color:'#fbbf24'}:{background:'rgba(124,92,252,0.16)',color:'#a78bfa'}),\n        starCss: this.css({ color: isUrgent?'#fbbf24':'#5b606e' }),\n        nameCss: this.css(allReady?{ color:'#34d399', animation:'nameGlow 1.6s ease-in-out infinite' }:{}),\n        cardCss: this.css(cardStyle),\n        chevronCss: this.css(isOpen?{ transform:'rotate(180deg)', color:'#9aa1b0' }:{}),\n        jobsWrapCss: 'display:'+(isOpen?'block':'none'),\n        pills,\n        addJobLabel:'הוסף הזמנה ל'+name,\n        jobs:jobVals,\n        onToggle:()=>this.toggleClient(name),\n        onToggleUrgent:(e)=>this.toggleUrgent(name,e),\n        onAddJob:(e)=>this.openAddJobForClient(name,e)\n      };\n    });\n\n    const sumOrder=orders.find(o=>o.id===this.state.sumOrderId);\n\n    const editing=!!this.state.editJobId;\n    const modalTitle = editing ? ('עריכת הזמנה #'+this.state.editJobId) : (this.state.form.name && !editing && this.state.modal==='order' && this.state._addingTo ? '' : 'הזמנה חדשה');\n\n    return {\n      shopTitle: this.props.title || 'ניהול הזמנות — בית דפוס',\n      logoCss:this.css({ background:A.grad, boxShadow:'0 8px 22px '+A.ring }),\n      titleCss:this.css({ background:A.grad, WebkitBackgroundClip:'text', backgroundClip:'text', WebkitTextFillColor:'transparent', color:'transparent' }),\n      newBtnCss:this.css({ background:A.grad, boxShadow:'0 6px 18px '+A.ring }),\n      saveBtnCss:this.css({ background:A.grad, boxShadow:'0 4px 14px '+A.ring }),\n\n      syncDotCss: this.css(this.state.loading ? { background:'#fbbf24', boxShadow:'0 0 8px #fbbf24' } : (this.state.errored ? { background:'#f87171', boxShadow:'0 0 8px #f87171' } : { background:'#34d399', boxShadow:'0 0 8px #34d399' })),\n      syncLabel: this.state.loading ? 'מסנכרן...' : (this.state.errored ? 'שגיאת חיבור' : 'מחובר ל-Sheets'),\n\n      statHold, statProd, statReady,\n\n      query:this.state.query, filterStatus:this.state.filterStatus,\n      onSearch:(e)=>this.setState({ query:e.target.value }),\n      onFilter:(e)=>this.setState({ filterStatus:e.target.value }),\n      onNewOrder:()=>this.openNewOrder(),\n      onExport:()=>this.exportCSV(),\n      onPrintReady:()=>this.printReady(),\n\n      loading:this.state.loading,\n      errored:this.state.errored && !this.state.loading,\n      isEmpty: !this.state.loading && !this.state.errored && clients.length===0,\n      emptyText: orders.length ? 'לא נמצאו תוצאות' : 'אין הזמנות עדיין — לחץ \"הזמנה חדשה\" כדי להתחיל',\n      clients,\n\n      statusOpts:[{value:'hold',label:'בהמתנה'},{value:'prod',label:'בייצור'},{value:'ready',label:'מוכן'},{value:'done',label:'נמסרה'}],\n\n      // order modal\n      orderOverlayCss: 'display:'+(this.state.modal==='order'?'flex':'none'),\n      modalTitle: editing ? ('עריכת הזמנה #'+this.state.editJobId) : 'הזמנה חדשה',\n      form:this.state.form,\n      acItems: this.state.acItems.map(n=>({ name:n, onSelect:(e)=>{ if(e&&e.preventDefault)e.preventDefault(); this.selectClient(n); } })),\n      acCss: 'display:'+((this.state.acOpen && this.state.acItems.length)?'block':'none'),\n      onName:(e)=>this.onNameInput(e.target.value),\n      onPhone:(e)=>this.setField('phone',e.target.value),\n      onType:(e)=>this.setField('type',e.target.value),\n      onPrice:(e)=>this.setField('price',e.target.value),\n      onDate:(e)=>this.setField('date',e.target.value),\n      onDue:(e)=>this.setField('due',e.target.value),\n      onStatus:(e)=>this.setField('status',e.target.value),\n      onInstall:(e)=>this.setField('install',e.target.checked),\n      onNotes:(e)=>this.onNotesInput(e.target.value),\n      onSave:()=>this.saveOrder(false),\n      onSaveWA:()=>this.saveAndSendWA(),\n      onClose:()=>this.closeAll(),\n\n      // sum modal\n      sumOverlayCss: 'display:'+(this.state.modal==='sum'?'flex':'none'),\n      sumText: this.buildSummary(sumOrder),\n      onCopy:()=>this.copySum(),\n      onWA:()=>this.sendWA(),\n      onMail:()=>this.sendMail(),\n\n      // toast\n      toastCss: this.css(this.state.toast ? { background:A.solid, opacity:1, animation:'toastIn .25s ease' } : { opacity:0 }),\n      toastMsg: this.state.toast\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
